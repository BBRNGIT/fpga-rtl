# library/components/dsp48e2.comp.yaml — the UltraScale+ DSP48E2 slice as a library
# component, built from its underlying flip-flops (its pipeline + control registers).
#
# Authentic register set sourced from AMD UG579 / UG974 (UltraScale DSP Slice):
#   data path : A1 A2 B1 B2 C D AD M P CARRYIN   (full pipeline config — all stages)
#   control   : INMODE OPMODE ALUMODE CARRYINSEL
# = 14 registers. Per the pipeline design decision, each register is one uniform
# 64-bit flip-flop word (`dff`), not its native width — decision-ease, founder call.
# Real cell_dff, composed exactly like clb_slice. Each register's d/en are component
# ports (bound at install); q is the registered output.

component: dsp48e2
params:
  init: 0
ports:
  in:  [a1_d, a1_en, a2_d, a2_en, b1_d, b1_en, b2_d, b2_en, c_d, c_en,
        d_d, d_en, ad_d, ad_en, m_d, m_en, p_d, p_en, carryin_d, carryin_en,
        inmode_d, inmode_en, opmode_d, opmode_en, alumode_d, alumode_en,
        carryinsel_d, carryinsel_en]
  out: [a1_q, a2_q, b1_q, b2_q, c_q, d_q, ad_q, m_q, p_q, carryin_q,
        inmode_q, opmode_q, alumode_q, carryinsel_q]

body:
  instances:
    - {name: r_a1,         component: dff, params: {init: init}}
    - {name: r_a2,         component: dff, params: {init: init}}
    - {name: r_b1,         component: dff, params: {init: init}}
    - {name: r_b2,         component: dff, params: {init: init}}
    - {name: r_c,          component: dff, params: {init: init}}
    - {name: r_d,          component: dff, params: {init: init}}
    - {name: r_ad,         component: dff, params: {init: init}}
    - {name: r_m,          component: dff, params: {init: init}}
    - {name: r_p,          component: dff, params: {init: init}}
    - {name: r_carryin,    component: dff, params: {init: init}}
    - {name: r_inmode,     component: dff, params: {init: init}}
    - {name: r_opmode,     component: dff, params: {init: init}}
    - {name: r_alumode,    component: dff, params: {init: init}}
    - {name: r_carryinsel, component: dff, params: {init: init}}
  connections:
    - {net: [a1_d,          r_a1.d]}
    - {net: [a1_en,         r_a1.en]}
    - {net: [r_a1.q,        a1_q]}
    - {net: [a2_d,          r_a2.d]}
    - {net: [a2_en,         r_a2.en]}
    - {net: [r_a2.q,        a2_q]}
    - {net: [b1_d,          r_b1.d]}
    - {net: [b1_en,         r_b1.en]}
    - {net: [r_b1.q,        b1_q]}
    - {net: [b2_d,          r_b2.d]}
    - {net: [b2_en,         r_b2.en]}
    - {net: [r_b2.q,        b2_q]}
    - {net: [c_d,           r_c.d]}
    - {net: [c_en,          r_c.en]}
    - {net: [r_c.q,         c_q]}
    - {net: [d_d,           r_d.d]}
    - {net: [d_en,          r_d.en]}
    - {net: [r_d.q,         d_q]}
    - {net: [ad_d,          r_ad.d]}
    - {net: [ad_en,         r_ad.en]}
    - {net: [r_ad.q,        ad_q]}
    - {net: [m_d,           r_m.d]}
    - {net: [m_en,          r_m.en]}
    - {net: [r_m.q,         m_q]}
    - {net: [p_d,           r_p.d]}
    - {net: [p_en,          r_p.en]}
    - {net: [r_p.q,         p_q]}
    - {net: [carryin_d,     r_carryin.d]}
    - {net: [carryin_en,    r_carryin.en]}
    - {net: [r_carryin.q,   carryin_q]}
    - {net: [inmode_d,      r_inmode.d]}
    - {net: [inmode_en,     r_inmode.en]}
    - {net: [r_inmode.q,    inmode_q]}
    - {net: [opmode_d,      r_opmode.d]}
    - {net: [opmode_en,     r_opmode.en]}
    - {net: [r_opmode.q,    opmode_q]}
    - {net: [alumode_d,     r_alumode.d]}
    - {net: [alumode_en,    r_alumode.en]}
    - {net: [r_alumode.q,   alumode_q]}
    - {net: [carryinsel_d,  r_carryinsel.d]}
    - {net: [carryinsel_en, r_carryinsel.en]}
    - {net: [r_carryinsel.q, carryinsel_q]}
