# library/atoms.yaml — irreducible C-LOWERED primitives (two of the three classes).
#
# These are the leaves whose ONLY definition is their C function in cells/cells.h
# (the audited canon), transcribed VERBATIM. The THIRD primitive class — conductors
# (wire/bus) — is NOT here: a conductor is not a cell and holds no state; see
# conductors.yaml. (Founder law: built-from-primitives and addressable are distinct
# axes; flip-flops and conductors are distinct classes — do not conflate.)
#
# `c` = the exact C function; `in`/`out` = its ports; `shift` marks a compile-time
# shift operand (sar/shl); `mode` the addsub add/sub operand.

# --- CLASS 1: gate / boolean constructs (combinational, stateless) -----------
gates:
  buf:    {c: cell_buf,    in: [a],            out: [y]}
  not:    {c: cell_not,    in: [a],            out: [y]}
  and:    {c: cell_and,    in: [a, b],         out: [y]}
  or:     {c: cell_or,     in: [a, b],         out: [y]}
  xor:    {c: cell_xor,    in: [a, b],         out: [y]}
  mux:    {c: cell_mux,    in: [a, b, sel],    out: [y]}
  eqmask: {c: cell_eqmask, in: [a, b],         out: [y]}
  fa:     {c: cell_fa,     in: [a, b, cin],    out: [y]}     # sum bit0, carry bit1
  gate:   {c: cell_gate,   in: [val, en],      out: [y]}
  addsub: {c: cell_addsub, in: [a, b],         out: [y], mode: sub}   # sub: 0=add 1=sub
  sar:    {c: cell_sar,    in: [a],            out: [y], shift: n}     # compile-time n
  shl:    {c: cell_shl,    in: [a],            out: [y], shift: n}     # compile-time n

# --- CLASS 2: flip-flops (stateful). The D flip-flop is the irreducible state -
# atom; the OTHER flip-flop types (T/SR/JK/D-latch) are composites in components/.
flip_flops:
  dff:    {c: cell_dff,    in: [q, d, en],     out: [q]}     # q in+out = feedback
