# fpga_nic_modules.yaml
#
# Module specification for NIC FPGA specialization.
#
# This is the INPUT to gen_fpga_specialization.py.
# Describes which modules run on this FPGA, their resource budgets,
# and clock domains. The tool allocates addresses automatically.

fpga_name: nic

# Primary clock for this FPGA
clock_primary: 125 MHz MAC clock (external_phy)

# Modules in this FPGA instance
modules:
  - name: adapter
    cells: 208
    bram: 0
    clock_domain: mac
    comment: "Source: timestamp-paced CSV parser, deposits into wire"

  - name: wire
    cells: 0
    bram: 0
    clock_domain: none
    comment: "Passive addressed-memory bus, sole writer = adapter"

  - name: mac
    cells: 5
    bram: 0
    clock_domain: mac
    comment: "125 MHz NIC sample/copy-rate clock"

  - name: taiosc
    cells: 5
    bram: 0
    clock_domain: taiosc
    comment: "Authoritative TAI oscillator, free-running"

  - name: tai
    cells: 4
    bram: 0
    clock_domain: taiosc
    comment: "Plain TAI counter off taiosc"

  - name: tai_cdc
    cells: 12
    bram: 0
    clock_domain: mac_to_internal_crossing
    comment: "Gray-code 2-FF CDC of tai into MAC domain"

  - name: nic
    cells: 180
    bram: 0
    clock_domain: mac
    comment: "Samples wire, dedup by seq, stamps tai_cdc, strobes nic→fifo seam"

  - name: fifo_rx
    cells: 8211
    bram: 64
    clock_domain: mac_to_internal_crossing
    comment: "MAC→internal async CDC FIFO, 512-slot packet-wide"
