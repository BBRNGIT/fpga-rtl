# candle_logic.yaml — COMPLETE logic specification for the Candle indicator.
#
# This is a SPEC INPUT (human-authored), consumed by the generic meta-tool
# gen_module_net.py to emit candle.net.json (a TOOL OUTPUT), which gennet.py
# then turns into candle_gen.h (a TOOL OUTPUT). Neither the netlist nor the
# gen.h is hand-written — both are produced by running the tools on this YAML.
#
# It fixes the WAVE-1 failure: WAVE-1 emitters declared registers but omitted
# (or under-specified) the combinational logic + wiring, so the generated tick
# was a stub. Here EVERY register's update is a named comb_node chain of
# canonical cells, and every dff names what feeds it and when it is enabled.
#
# Schema (consumed by gen_module_net.py):
#   module        : str
#   kind          : str (module | indicator | ...)
#   clock         : {power, ...}            (optional; self-running power bit)
#   seam_inputs   : [{name, type, source, comment}]      (published upstream lanes)
#   const_nodes   : [{name, type, value, comment}]       (reset-latched constants)
#   dff_nodes     : [{name, type, fed_by, enable, comment}]
#                     fed_by : comb_node name that drives this register
#                              (default: a same-named "<NAME>_UPDATE" comb_node if
#                               present, else the register holds its prior value)
#                     enable : comb_node/const whose bit0 gates the write
#                              (default: always write)
#   history_ring  : {name, depth, index, fields, write_enable}
#   comb_nodes    : [{name, cell, inputs, invert, sub, shift_right, comment}]
#                     cell : buf|not|and|or|xor|mux|eqmask|addsub|cmp_lt
#   wiring        : free-form doc map (signal -> consumers) for traceability
#   seam_outputs  : [{name, source, type, comment}]      (relay lanes downstream)

module: candle
kind: indicator
# No window_base: build artifacts carry no addresses (build-vs-assignment
# separation). Absolute placement is assigned later by the registry toolbox.

clock: passive
# Passive consumer (indicator): candle owns no clock. The device fabric clocks
# it each edge; in standalone test the testbench loops candle_tick. Consistent
# with footprint/tpo (no-clock) and the founder indicator architecture.

# ---------------------------------------------------------------------------
# 1. INPUT INTERFACE — published upstream lanes (module barrier: read-only).
# ---------------------------------------------------------------------------
seam_inputs:
  - {name: IN_BID_PRICE,  type: u64, source: "",       comment: "Best bid price (highest bid level)"}
  - {name: IN_ASK_PRICE,  type: u64, source: "",       comment: "Best ask price (lowest ask level)"}
  - {name: IN_BID_QTY,    type: u64, source: "",       comment: "Bid quantity at top level"}
  - {name: IN_ASK_QTY,    type: u64, source: "",       comment: "Ask quantity at top level"}
  - {name: IN_BAR_SEQ, type: u64, source: "", comment: "Timeframe bar sequence (bar-boundary detection)"}
  - {name: IN_BAR_TIME,     type: u64, source: "", comment: "TAI at current bar open (latched into completed bar)"}

# ---------------------------------------------------------------------------
# 2. CONSTANTS — reset-latched arms, never written by the tick.
# ---------------------------------------------------------------------------
const_nodes:
  - {name: CANDLE_POWER,         type: u64, value: 0, comment: "Power bit; starter sets to 1 to run"}
  - {name: CANDLE_ONE,          type: u64, value: 1, comment: "Constant 1 (volume increment amount)"}
  - {name: CANDLE_OPEN_SET_HOLD,  type: u64, value: 1, comment: "OPEN_SET steady-state value (open already latched)"}
  - {name: CANDLE_ZERO,         type: u64, value: 0, comment: "Constant 0 (fresh-bar reset arm for accumulators)"}

# ---------------------------------------------------------------------------
# 3. REGISTERS — live bar state + completed-bar snapshot + bar control.
#    Each dff names the comb_node that feeds it (fed_by) and, when its write is
#    conditional, the gating signal (enable). Branchless: enable is mask algebra
#    in cell_dff, not an if. Completed-bar registers are enabled by the
#    bar-boundary pulse; accumulators reset on the boundary via a mux arm.
# ---------------------------------------------------------------------------
dff_nodes:
  # --- live OHLC (bid) ---
  - {name: CANDLE_BID_OPEN,  type: u64, fed_by: CANDLE_BID_OPEN_UPDATE,  comment: "First bid price of bar"}
  - {name: CANDLE_BID_HIGH,  type: u64, fed_by: CANDLE_BID_HIGH_UPDATE,  comment: "Running max bid price"}
  - {name: CANDLE_BID_LOW,   type: u64, fed_by: CANDLE_BID_LOW_UPDATE,   comment: "Running min bid price"}
  - {name: CANDLE_BID_CLOSE, type: u64, fed_by: CANDLE_BID_CLOSE_UPDATE, comment: "Most recent bid price"}
  # --- live OHLC (ask) ---
  - {name: CANDLE_ASK_OPEN,  type: u64, fed_by: CANDLE_ASK_OPEN_UPDATE,  comment: "First ask price of bar"}
  - {name: CANDLE_ASK_HIGH,  type: u64, fed_by: CANDLE_ASK_HIGH_UPDATE,  comment: "Running max ask price"}
  - {name: CANDLE_ASK_LOW,   type: u64, fed_by: CANDLE_ASK_LOW_UPDATE,   comment: "Running min ask price"}
  - {name: CANDLE_ASK_CLOSE, type: u64, fed_by: CANDLE_ASK_CLOSE_UPDATE, comment: "Most recent ask price"}
  # --- live accumulators ---
  - {name: CANDLE_VOLUME_BID,         type: u64, fed_by: CANDLE_VOLUME_BID_UPDATE,         comment: "Cumulative bid ticks this bar"}
  - {name: CANDLE_VOLUME_ASK,         type: u64, fed_by: CANDLE_VOLUME_ASK_UPDATE,         comment: "Cumulative ask ticks this bar"}
  - {name: CANDLE_TRUE_RANGE_BID,     type: u64, fed_by: CANDLE_TRUE_RANGE_BID_UPDATE,     comment: "bid_high - bid_low"}
  - {name: CANDLE_TRUE_RANGE_ASK,     type: u64, fed_by: CANDLE_TRUE_RANGE_ASK_UPDATE,     comment: "ask_high - ask_low"}
  - {name: CANDLE_INTRABAR_QTY_DELTA, type: u64, fed_by: CANDLE_INTRABAR_QTY_DELTA_UPDATE, comment: "Cumulative (ask_qty - bid_qty) over bar"}
  - {name: CANDLE_MID,                type: u64, fed_by: CANDLE_MID_UPDATE,                comment: "(bid_high + ask_low) >> 1"}
  # --- bar control ---
  - {name: CANDLE_OPEN_SET,    type: u64, fed_by: CANDLE_OPEN_SET_UPDATE,  comment: "1 once first tick of bar processed; 0 on fresh bar"}
  - {name: CANDLE_LAST_TF_SEQ, type: u64, fed_by: CANDLE_LAST_TF_SEQ_UPDATE, comment: "Last TF seq seen (bar-boundary edge detect)"}
  - {name: CANDLE_BAR_SEQ,     type: u64, fed_by: CANDLE_BAR_SEQ_UPDATE,   comment: "Bar sequence counter (+1 each boundary)"}
  # --- completed-bar snapshot (enabled only on the boundary pulse) ---
  - {name: CANDLE_COMP_BID_OPEN,          type: u64, fed_by: CANDLE_BID_OPEN,          enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid open"}
  - {name: CANDLE_COMP_BID_HIGH,          type: u64, fed_by: CANDLE_BID_HIGH,          enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid high"}
  - {name: CANDLE_COMP_BID_LOW,           type: u64, fed_by: CANDLE_BID_LOW,           enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid low"}
  - {name: CANDLE_COMP_BID_CLOSE,         type: u64, fed_by: CANDLE_BID_CLOSE,         enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid close"}
  - {name: CANDLE_COMP_ASK_OPEN,          type: u64, fed_by: CANDLE_ASK_OPEN,          enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask open"}
  - {name: CANDLE_COMP_ASK_HIGH,          type: u64, fed_by: CANDLE_ASK_HIGH,          enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask high"}
  - {name: CANDLE_COMP_ASK_LOW,           type: u64, fed_by: CANDLE_ASK_LOW,           enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask low"}
  - {name: CANDLE_COMP_ASK_CLOSE,         type: u64, fed_by: CANDLE_ASK_CLOSE,         enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask close"}
  - {name: CANDLE_COMP_VOLUME_BID,        type: u64, fed_by: CANDLE_VOLUME_BID,        enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid volume"}
  - {name: CANDLE_COMP_VOLUME_ASK,        type: u64, fed_by: CANDLE_VOLUME_ASK,        enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask volume"}
  - {name: CANDLE_COMP_TRUE_RANGE_BID,    type: u64, fed_by: CANDLE_TRUE_RANGE_BID,    enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar bid true range"}
  - {name: CANDLE_COMP_TRUE_RANGE_ASK,    type: u64, fed_by: CANDLE_TRUE_RANGE_ASK,    enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar ask true range"}
  - {name: CANDLE_COMP_INTRABAR_QTY_DELTA,type: u64, fed_by: CANDLE_INTRABAR_QTY_DELTA,enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar intrabar qty delta"}
  - {name: CANDLE_COMP_TAI,               type: u64, fed_by: IN_BAR_TIME,                  enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar TAI timestamp"}
  - {name: CANDLE_COMP_BAR_SEQ,           type: u64, fed_by: CANDLE_BAR_SEQ,           enable: CANDLE_BAR_BOUNDARY, comment: "Completed bar sequence"}

# ---------------------------------------------------------------------------
# 4. HISTORY RING — append the completed bar each boundary, wrapping at depth.
#    index = ring_cnt & (depth-1); depth is a power of two so the index is a
#    branchless mask cell (no %). write_enable is the bar-boundary pulse.
#    DEFAULT depth 256 applied (open_decision: candle history depth).
# ---------------------------------------------------------------------------
history_ring:
  name: CANDLE_HIST
  depth: 256
  write_enable: CANDLE_BAR_BOUNDARY
  fields:
    - {name: BID_OPEN,          source: CANDLE_BID_OPEN}
    - {name: BID_HIGH,          source: CANDLE_BID_HIGH}
    - {name: BID_LOW,           source: CANDLE_BID_LOW}
    - {name: BID_CLOSE,         source: CANDLE_BID_CLOSE}
    - {name: ASK_OPEN,          source: CANDLE_ASK_OPEN}
    - {name: ASK_HIGH,          source: CANDLE_ASK_HIGH}
    - {name: ASK_LOW,           source: CANDLE_ASK_LOW}
    - {name: ASK_CLOSE,         source: CANDLE_ASK_CLOSE}
    - {name: VOLUME_BID,        source: CANDLE_VOLUME_BID}
    - {name: VOLUME_ASK,        source: CANDLE_VOLUME_ASK}
    - {name: TRUE_RANGE_BID,    source: CANDLE_TRUE_RANGE_BID}
    - {name: TRUE_RANGE_ASK,    source: CANDLE_TRUE_RANGE_ASK}
    - {name: INTRABAR_QTY_DELTA,source: CANDLE_INTRABAR_QTY_DELTA}
    - {name: TAI,               source: IN_BAR_TIME}
    - {name: BAR_SEQ,           source: CANDLE_BAR_SEQ}

# ---------------------------------------------------------------------------
# 5. COMBINATIONAL LOGIC — every cell call, branchless. Ordering matters:
#    a comb_node may reference an earlier comb_node by its (lower-cased) name.
#    Cells: buf, not, and, or, xor, mux(a,b,sel)=sel?b:a, eqmask(a,b)=1 iff a==b,
#    addsub(a,b,sub), cmp_lt(a,b)=1 iff a<b (gate-netlist helper).
# ---------------------------------------------------------------------------
comb_nodes:
  # --- 5.0 bar-boundary + fresh-bar control (computed FIRST) ---
  # raw seq change: 1 iff LAST_TF_SEQ != IN_BAR_SEQ.
  - {name: CANDLE_SEQ_CHANGE, cell: eqmask, inputs: [CANDLE_LAST_TF_SEQ, IN_BAR_SEQ], invert: true,
     comment: "1 iff timeframe seq differs from last cycle"}
  # A real boundary only counts AFTER the first tick (open_set=1): the very first
  # tick at power-on has LAST_TF_SEQ=0 which would falsely look like a change.
  # bar_boundary = seq_change AND open_set  (suppresses the startup pseudo-edge).
  - {name: CANDLE_BAR_BOUNDARY, cell: and, inputs: [CANDLE_SEQ_CHANGE, CANDLE_OPEN_SET],
     comment: "1 iff seq changed AND a bar was already open (true bar close)"}
  # is_fresh = boundary OR open not yet set -> the very first tick of a bar.
  - {name: CANDLE_NOT_OPEN_SET, cell: xor, inputs: [CANDLE_OPEN_SET, CANDLE_ONE],
     comment: "open_set ^ 1 — 1 while open not yet latched"}
  - {name: CANDLE_FRESH, cell: or, inputs: [CANDLE_BAR_BOUNDARY, CANDLE_NOT_OPEN_SET],
     comment: "fresh = boundary OR (open not set): seed OHLC this tick"}

  # --- 5.1 tick detection (price changed vs last close) ---
  - {name: CANDLE_BID_TICK, cell: eqmask, inputs: [IN_BID_PRICE, CANDLE_BID_CLOSE], invert: true,
     comment: "1 iff bid price differs from last latched bid"}
  - {name: CANDLE_ASK_TICK, cell: eqmask, inputs: [IN_ASK_PRICE, CANDLE_ASK_CLOSE], invert: true,
     comment: "1 iff ask price differs from last latched ask"}

  # --- 5.2 bid-side OHLC ---
  # OPEN: on fresh tick latch DOM, else hold.
  - {name: CANDLE_BID_OPEN_UPDATE, cell: mux, inputs: [CANDLE_BID_OPEN, IN_BID_PRICE, CANDLE_FRESH],
     comment: "fresh -> latch IN_BID_PRICE; else hold CANDLE_BID_OPEN"}
  # HIGH: running max. On fresh, seed = DOM; else max(high, DOM).
  - {name: CANDLE_BID_IS_NEW_HIGH, cell: cmp_lt, inputs: [CANDLE_BID_HIGH, IN_BID_PRICE],
     comment: "1 iff current high < IN_BID_PRICE (new high)"}
  - {name: CANDLE_BID_HIGH_TRACK, cell: mux, inputs: [CANDLE_BID_HIGH, IN_BID_PRICE, CANDLE_BID_IS_NEW_HIGH],
     comment: "max(high, DOM): pick DOM when new high, else hold"}
  - {name: CANDLE_BID_HIGH_UPDATE, cell: mux, inputs: [CANDLE_BID_HIGH_TRACK, IN_BID_PRICE, CANDLE_FRESH],
     comment: "fresh -> seed DOM; else running max"}
  # LOW: running min. On fresh, seed = DOM; else min(low, DOM).
  - {name: CANDLE_BID_IS_NEW_LOW, cell: cmp_lt, inputs: [IN_BID_PRICE, CANDLE_BID_LOW],
     comment: "1 iff IN_BID_PRICE < current low (new low)"}
  - {name: CANDLE_BID_LOW_TRACK, cell: mux, inputs: [CANDLE_BID_LOW, IN_BID_PRICE, CANDLE_BID_IS_NEW_LOW],
     comment: "min(low, DOM): pick DOM when new low, else hold"}
  - {name: CANDLE_BID_LOW_UPDATE, cell: mux, inputs: [CANDLE_BID_LOW_TRACK, IN_BID_PRICE, CANDLE_FRESH],
     comment: "fresh -> seed DOM; else running min"}
  # CLOSE: always latch most recent.
  - {name: CANDLE_BID_CLOSE_UPDATE, cell: buf, inputs: [IN_BID_PRICE],
     comment: "passthrough — always latch most recent bid"}

  # --- 5.3 ask-side OHLC (symmetric) ---
  - {name: CANDLE_ASK_OPEN_UPDATE, cell: mux, inputs: [CANDLE_ASK_OPEN, IN_ASK_PRICE, CANDLE_FRESH],
     comment: "fresh -> latch IN_ASK_PRICE; else hold"}
  - {name: CANDLE_ASK_IS_NEW_HIGH, cell: cmp_lt, inputs: [CANDLE_ASK_HIGH, IN_ASK_PRICE], comment: "new ask high"}
  - {name: CANDLE_ASK_HIGH_TRACK, cell: mux, inputs: [CANDLE_ASK_HIGH, IN_ASK_PRICE, CANDLE_ASK_IS_NEW_HIGH], comment: "max(high,DOM)"}
  - {name: CANDLE_ASK_HIGH_UPDATE, cell: mux, inputs: [CANDLE_ASK_HIGH_TRACK, IN_ASK_PRICE, CANDLE_FRESH], comment: "fresh seed else max"}
  - {name: CANDLE_ASK_IS_NEW_LOW, cell: cmp_lt, inputs: [IN_ASK_PRICE, CANDLE_ASK_LOW], comment: "new ask low"}
  - {name: CANDLE_ASK_LOW_TRACK, cell: mux, inputs: [CANDLE_ASK_LOW, IN_ASK_PRICE, CANDLE_ASK_IS_NEW_LOW], comment: "min(low,DOM)"}
  - {name: CANDLE_ASK_LOW_UPDATE, cell: mux, inputs: [CANDLE_ASK_LOW_TRACK, IN_ASK_PRICE, CANDLE_FRESH], comment: "fresh seed else min"}
  - {name: CANDLE_ASK_CLOSE_UPDATE, cell: buf, inputs: [IN_ASK_PRICE], comment: "passthrough — most recent ask"}

  # --- 5.4 volume accumulation with bar-boundary reset ---
  # incremented value = volume + tick; on fresh bar reset to the tick count of
  # this first tick (i.e. start from 0 + tick). Implemented as:
  #   base = mux(volume, ZERO, FRESH)   (fresh -> 0, else current)
  #   next = addsub(base, tick, 0)
  - {name: CANDLE_VOLUME_BID_BASE, cell: mux, inputs: [CANDLE_VOLUME_BID, CANDLE_ZERO, CANDLE_FRESH],
     comment: "fresh -> 0 (reset), else hold accumulator"}
  - {name: CANDLE_VOLUME_BID_UPDATE, cell: addsub, inputs: [CANDLE_VOLUME_BID_BASE, CANDLE_BID_TICK], sub: 0,
     comment: "base + bid_tick (gated +1)"}
  - {name: CANDLE_VOLUME_ASK_BASE, cell: mux, inputs: [CANDLE_VOLUME_ASK, CANDLE_ZERO, CANDLE_FRESH], comment: "fresh reset else hold"}
  - {name: CANDLE_VOLUME_ASK_UPDATE, cell: addsub, inputs: [CANDLE_VOLUME_ASK_BASE, CANDLE_ASK_TICK], sub: 0, comment: "base + ask_tick"}

  # --- 5.5 true range (high - low) on the freshly-updated high/low ---
  - {name: CANDLE_TRUE_RANGE_BID_UPDATE, cell: addsub, inputs: [CANDLE_BID_HIGH_UPDATE, CANDLE_BID_LOW_UPDATE], sub: 1,
     comment: "bid_high' - bid_low' (this tick's updated values)"}
  - {name: CANDLE_TRUE_RANGE_ASK_UPDATE, cell: addsub, inputs: [CANDLE_ASK_HIGH_UPDATE, CANDLE_ASK_LOW_UPDATE], sub: 1,
     comment: "ask_high' - ask_low'"}

  # --- 5.6 intrabar quantity delta (cumulative ask_qty - bid_qty) with reset ---
  - {name: CANDLE_QUOTE_DELTA, cell: addsub, inputs: [IN_ASK_QTY, IN_BID_QTY], sub: 1,
     comment: "ask_qty - bid_qty this quote"}
  - {name: CANDLE_DELTA_BASE, cell: mux, inputs: [CANDLE_INTRABAR_QTY_DELTA, CANDLE_ZERO, CANDLE_FRESH],
     comment: "fresh -> 0 (reset), else hold accumulator"}
  - {name: CANDLE_INTRABAR_QTY_DELTA_UPDATE, cell: addsub, inputs: [CANDLE_DELTA_BASE, CANDLE_QUOTE_DELTA], sub: 0,
     comment: "base + quote_delta"}

  # --- 5.7 mid convenience: (bid_high' + ask_low') >> 1 ---
  - {name: CANDLE_MID_UPDATE, cell: addsub, inputs: [CANDLE_BID_HIGH_UPDATE, CANDLE_ASK_LOW_UPDATE], sub: 0, shift_right: 1,
     comment: "(bid_high' + ask_low') / 2 via power-of-two shift"}

  # --- 5.8 bar control writes ---
  # OPEN_SET: latches to 1 after the first processed tick and STAYS 1. At
  # power-on it is 0, so the very first tick's FRESH (= boundary OR !open_set) is
  # 1 and seeds bar 0; thereafter open_set=1. Re-seeding at a real bar boundary
  # is driven by CANDLE_BAR_BOUNDARY (the TF-seq edge), NOT by open_set, so a bar
  # is seeded EXACTLY once (the boundary tick) and never double-seeded next tick.
  - {name: CANDLE_OPEN_SET_UPDATE, cell: buf, inputs: [CANDLE_OPEN_SET_HOLD],
     comment: "open_set' = 1 (steady): first tick seeds via !open_set, then holds 1"}
  # LAST_TF_SEQ: track the timeframe seq so the next boundary is edge-detected.
  - {name: CANDLE_LAST_TF_SEQ_UPDATE, cell: buf, inputs: [IN_BAR_SEQ],
     comment: "latch current TF seq for next-cycle edge detect"}
  # BAR_SEQ: +1 on each boundary.
  - {name: CANDLE_BAR_SEQ_UPDATE, cell: addsub, inputs: [CANDLE_BAR_SEQ, CANDLE_BAR_BOUNDARY], sub: 0,
     comment: "bar_seq + boundary (counts completed bars)"}

# ---------------------------------------------------------------------------
# 6. WIRING — traceability map (doc only; gen_module_net.py copies into netlist).
# ---------------------------------------------------------------------------
wiring:
  IN_BID_PRICE:  [CANDLE_BID_OPEN_UPDATE, CANDLE_BID_IS_NEW_HIGH, CANDLE_BID_HIGH_TRACK, CANDLE_BID_IS_NEW_LOW, CANDLE_BID_LOW_TRACK, CANDLE_BID_CLOSE_UPDATE, CANDLE_BID_TICK]
  IN_ASK_PRICE:  [CANDLE_ASK_OPEN_UPDATE, CANDLE_ASK_IS_NEW_HIGH, CANDLE_ASK_HIGH_TRACK, CANDLE_ASK_IS_NEW_LOW, CANDLE_ASK_LOW_TRACK, CANDLE_ASK_CLOSE_UPDATE, CANDLE_ASK_TICK]
  IN_BID_QTY:    [CANDLE_QUOTE_DELTA]
  IN_ASK_QTY:    [CANDLE_QUOTE_DELTA]
  IN_BAR_SEQ: [CANDLE_BAR_BOUNDARY, CANDLE_LAST_TF_SEQ_UPDATE]
  CANDLE_BAR_BOUNDARY: [CANDLE_FRESH, CANDLE_OPEN_SET_UPDATE, CANDLE_BAR_SEQ_UPDATE, "completed-bar latches (enable)", "history ring write_enable"]

# ---------------------------------------------------------------------------
# 7. OUTPUT INTERFACE — relay lanes downstream consumers sample.
# ---------------------------------------------------------------------------
seam_outputs:
  - {name: CANDLE_BID_OHLC_OUT,   source: CANDLE_BID_CLOSE,         type: u64, comment: "Bid OHLC relay (read OPEN/HIGH/LOW/CLOSE)"}
  - {name: CANDLE_ASK_OHLC_OUT,   source: CANDLE_ASK_CLOSE,         type: u64, comment: "Ask OHLC relay"}
  - {name: CANDLE_VOLUME_OUT,     source: CANDLE_VOLUME_BID,        type: u64, comment: "Volume relay (read BID and ASK)"}
  - {name: CANDLE_TRUE_RANGE_OUT, source: CANDLE_TRUE_RANGE_BID,    type: u64, comment: "True range relay"}
  - {name: CANDLE_DELTA_OUT,      source: CANDLE_INTRABAR_QTY_DELTA, type: u64, comment: "Intrabar delta relay"}
