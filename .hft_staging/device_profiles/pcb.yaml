# device_profiles/pcb.yaml — PCB device profile (consumed by gen_device_specialization.py)
# Integers only — no floats anywhere.

type: pcb
description: "PCB (IC packages / resistors / capacitors)"

address_space: 0x01000000        # 16 MB board-level register map
slot_alignment: 0x1000
cdc_region_size: 0x10000
module_base: 0x00000000

clock_domains:
  board:
    frequency_hz: 100000000
    source: board_oscillator
  taiosc:
    frequency_hz: 1000000
    source: oscillator

resources:
  package:
    capacity: 64
    unit: ic_package
    maps: packages
    per_unit: 1
  resistor:
    capacity: 1024
    unit: part
    maps: resistors
    per_unit: 1
  capacitor:
    capacity: 1024
    unit: part
    maps: capacitors
    per_unit: 1
  logic_ic:
    capacity: 32
    unit: ic
    maps: cells
    per_unit: 64               # one logic IC absorbs up to 64 register cells
