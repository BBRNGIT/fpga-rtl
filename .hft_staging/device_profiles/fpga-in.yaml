# device_profiles/fpga-in.yaml — BOARD PROFILE (factory_toolchain.yaml format:
# board_profile). Real-part-referenced facts the fpga-in blank is cast from.
# Consumed by gen_fpga_blank.py. Integers only (no floats). NO addresses are
# assigned here — geometry/capacity only (addressing is phase 3).

name: fpga-in
role: "ingress boundary — external feed in, conditioning, time-stamping, crossing"
part_ref: "Xilinx Virtex UltraScale+ VU9P (XILINX_VU9P_SPEC_EXTRACTION.md)"

# Fabric register capacity reserved for this board's installed modules + buses.
# (The fabric IS the interconnect: a flat addressed word array of this size.)
registers: 65536            # 64K u64 fabric words

# Address-space GEOMETRY (sizes only — phase-3 addressing assigns actual addresses)
address_space:
  size: 0x10000000          # 256 MB window geometry
  slot_alignment: 0x1000
  cdc_region_size: 0x100000 # reserved geometry for cross-board CDC

# Clock domains this board hosts (descriptive table; the oscillator MODULES own
# the clocks — power + start/stop live in those modules per the clock rule).
clock_domains:
  mac:      {frequency_hz: 125000000, source: external_phy}
  internal: {frequency_hz: 250000000, source: pll_2x}
  taiosc:   {frequency_hz: 1000000,   source: oscillator}

# I/O geometry (real-part referenced)
io:
  gty_lanes: 8              # of VU9P's 32 GTY — feed-facing share
  io_banks: 12              # of 44

# Real-part resource budget slice for this board (of the VU9P totals)
resources:
  clb:  {capacity: 40000, unit: slice}     # of 182,400 CLBs
  bram: {capacity: 480,   unit: block36}   # of 2,160
  dsp:  {capacity: 800,   unit: dsp48e2}   # of 6,840

# Intended residents (DOCUMENTATION ONLY — install is phase 4, by tool)
intended_modules: [adapter, wire, nic, mac, fifo_rx, tai_cdc, pip_resolver]
