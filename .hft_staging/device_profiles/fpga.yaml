# device_profiles/fpga.yaml — FPGA device profile (consumed by gen_device_specialization.py)
#
# NOTHING fpga-specific lives in the Python tool. All type-specific knowledge
# (address space, clock-domain table, resource primitive catalog) is here.
# Integers only — no floats anywhere (C-as-RTL law #5 extends to artifacts).

type: fpga
description: "FPGA fabric (CLB/BRAM/DSP/GTY/IO-bank primitives)"

# Address space geometry
address_space: 0x10000000        # 256 MB
slot_alignment: 0x1000           # 4 KB module-window alignment
cdc_region_size: 0x100000        # 1 MB reserved at top for cross-device CDC
module_base: 0x00000000

# Clock domains known to this device family (frequency in Hz, integer)
clock_domains:
  mac:
    frequency_hz: 125000000
    source: external_phy
  internal:
    frequency_hz: 250000000
    source: pll_2x
  taiosc:
    frequency_hz: 1000000
    source: oscillator

# Resource primitive catalog. `maps` names the module-list field consumed;
# `per_unit` is how many of that field one primitive unit absorbs.
resources:
  clb:
    capacity: 120000
    unit: slice
    maps: cells
    per_unit: 8
  bram:
    capacity: 2160
    unit: block36
    maps: bram
    per_unit: 1
    bytes_per_unit: 2304         # 36-bit x 512 rows = 18432 bits = 2304 bytes
                                 # (matches deprecated gen_fpga_specialization.py
                                 #  window math: (bram*36*512)//8)
  dsp:
    capacity: 6840
    unit: slice
    maps: dsp
    per_unit: 1
  gty:
    capacity: 76
    unit: transceiver
    maps: gty
    per_unit: 1
  io_bank:
    capacity: 8
    unit: bank
    maps: io
    per_unit: 52
