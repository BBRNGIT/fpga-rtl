# device_profiles/fpga-control.yaml — BOARD PROFILE (format: board_profile).
# Real-part-referenced facts the fpga-control blank is cast from. Consumed by
# gen_fpga_blank.py. Integers only. NO addresses here — geometry only (phase 3).

name: fpga-control
role: "control/management — power harness, configuration, supervision (later: OMS/execution control plane)"
part_ref: "Xilinx Virtex UltraScale+ VU9P (XILINX_VU9P_SPEC_EXTRACTION.md)"

registers: 32768            # 32K u64 fabric words

address_space:
  size: 0x10000000
  slot_alignment: 0x1000
  cdc_region_size: 0x100000

clock_domains:
  internal: {frequency_hz: 250000000, source: pll_2x}
  taiosc:   {frequency_hz: 1000000,   source: oscillator}

io:
  gty_lanes: 8              # of 32
  io_banks: 12              # of 44

resources:
  clb:  {capacity: 42400, unit: slice}     # remainder of 182,400
  bram: {capacity: 480,   unit: block36}   # of 2,160
  dsp:  {capacity: 2040,  unit: dsp48e2}   # of 6,840

# Intended residents (DOCUMENTATION ONLY — install is phase 4, by tool)
intended_modules: [harness]
