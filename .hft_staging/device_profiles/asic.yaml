# device_profiles/asic.yaml — ASIC device profile (consumed by gen_device_specialization.py)
# Integers only — no floats anywhere.

type: asic
description: "ASIC (standard cells / SRAM macros / gates)"

address_space: 0x40000000        # 1 GB
slot_alignment: 0x1000
cdc_region_size: 0x200000
module_base: 0x00000000

clock_domains:
  core:
    frequency_hz: 1000000000
    source: pll_core
  io:
    frequency_hz: 250000000
    source: pll_io
  taiosc:
    frequency_hz: 1000000
    source: oscillator

resources:
  stdcell:
    capacity: 5000000
    unit: cell
    maps: cells
    per_unit: 1
  sram:
    capacity: 4096
    unit: macro_kb
    maps: bram
    per_unit: 1
    bytes_per_unit: 1024
  gate:
    capacity: 20000000
    unit: gate
    maps: gates
    per_unit: 1
