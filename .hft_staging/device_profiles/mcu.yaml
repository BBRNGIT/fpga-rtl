# device_profiles/mcu.yaml — MCU device profile (consumed by gen_device_specialization.py)
# Integers only — no floats anywhere.

type: mcu
description: "MCU (ARM core / RAM / GPIO / UART primitives)"

address_space: 0x00100000        # 1 MB peripheral + SRAM map
slot_alignment: 0x400            # 1 KB peripheral-window alignment
cdc_region_size: 0x4000          # 16 KB reserved for cross-device CDC mailboxes
module_base: 0x00000000

clock_domains:
  sysclk:
    frequency_hz: 168000000
    source: pll_main
  apb:
    frequency_hz: 42000000
    source: sysclk_div4
  lse:
    frequency_hz: 32768
    source: crystal_lse

resources:
  core:
    capacity: 2
    unit: arm_core
    maps: core
    per_unit: 1
  ram:
    capacity: 196608             # 192 KB SRAM, in bytes
    unit: byte
    maps: cells                  # 1 register cell = one 8-byte word of state
    per_unit: 1
    bytes_per_cell: 8
  gpio:
    capacity: 114
    unit: pin
    maps: io
    per_unit: 1
  uart:
    capacity: 6
    unit: peripheral
    maps: uart
    per_unit: 1
