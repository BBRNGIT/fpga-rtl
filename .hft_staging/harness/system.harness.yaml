# system.harness.yaml — THE POWER HARNESS SPEC (factory format: harness).
#
# Human-authored declaration of programmatic power control for the 3 board
# INSTANCES: master power bit, per-instance power-up sequence (in harness ticks),
# and the harness's own start/stop bound (clock rule). Consumed by gen_harness.py
# (which synthesizes the module logic and emits via the generic emitter — nothing
# by hand). Power-up order: control first (supervisor), then ingress, then compute.

boards:
  fpga-control: {power_lane: HARNESS_PWR_FPGA_CONTROL, at_tick: 0}
  fpga-in:      {power_lane: HARNESS_PWR_FPGA_IN,      at_tick: 4}
  fpga-main:    {power_lane: HARNESS_PWR_FPGA_MAIN,    at_tick: 8}

power_bit: HARNESS_POWER          # master switch — set once by the starter
start_stop: HARNESS_RUN_UNTIL     # harness sequence bound (clock rule)
sequence: [fpga-control, fpga-in, fpga-main]
run_until: 64
