# system.harness.yaml — THE POWER HARNESS SPEC (factory_toolchain.yaml format: harness).
#
# Human-authored declaration of programmatic power control for the 3 boards:
# master power bit, per-board power-up sequence (in harness ticks), and the
# harness's own start/stop bound (clock rule). Consumed by gen_harness.py, which
# synthesizes the harness module's logic spec and emits its netlist via the
# generic emitter — NOTHING by hand.
#
# Behaviour (structural, branchless):
#   * the harness self-runs from its master POWER bit, bounded by RUN_UNTIL;
#   * its sequence counter advances one per tick while powered and un-done;
#   * each board's power lane goes high when the counter reaches that board's
#     sequence threshold AND the master is on — and drops when the master drops
#     (combinational gate: powered iff reached AND master).
#
# Power-up order: control first (supervisor), then ingress, then compute.

boards:
  fpga-control: {power_lane: HARNESS_PWR_FPGA_CONTROL, at_tick: 0}
  fpga-in:      {power_lane: HARNESS_PWR_FPGA_IN,      at_tick: 4}
  fpga-main:    {power_lane: HARNESS_PWR_FPGA_MAIN,    at_tick: 8}

power_bit: HARNESS_POWER          # master switch — set once by the starter
start_stop: HARNESS_RUN_UNTIL     # harness sequence bound (clock rule)
sequence: [fpga-control, fpga-in, fpga-main]
run_until: 64                     # default bound for the sequence counter
