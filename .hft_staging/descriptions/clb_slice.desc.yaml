  - {net: [en_3,  ff_3.en]}
  - {net: [ff_3.q,  q_3]}
  - {net: [d_4,   ff_4.d]}
  - {net: [en_4,  ff_4.en]}
  - {net: [ff_4.q,  q_4]}
  - {net: [d_5,   ff_5.d]}
  - {net: [en_5,  ff_5.en]}
  - {net: [ff_5.q,  q_5]}
  - {net: [d_6,   ff_6.d]}
  - {net: [en_6,  ff_6.en]}
