# clb_slice.desc.yaml — ONE UltraScale+ CLB SLICE, composed of its 16 flip-flops.
#
# Authentic composition (UG574, same source as composition/clb.tile.yaml): a CLB =
# one SLICE = 16 flip-flops (+ 8 LUT6). This describes the SLICE's 16 FFs as 16
# `dff` library atoms — REAL cell_dff, built by the existing elaborate.py, exactly
# as toggle_demo's t_ff was. The 8 LUT6 are NOT here: `lut6` is not yet a library
# component (flagged library_component_pending in clb.tile.yaml) — composing it
# would require inventing it, so it is deliberately omitted, not faked.
#
# Each FF's d/en are external ports (bound at install/assignment — abstract here);
# q is the registered output. The DEVICE is this SLICE replicated across the grid
# (147,750 in the device model) — replication is parametric, not hand-listed.

design: clb_slice
kind: fabric_tile
ports:
  in:  [d_0, en_0, d_1, en_1, d_2, en_2, d_3, en_3, d_4, en_4, d_5, en_5,
        d_6, en_6, d_7, en_7, d_8, en_8, d_9, en_9, d_10, en_10, d_11, en_11,
        d_12, en_12, d_13, en_13, d_14, en_14, d_15, en_15]
  out: [q_0, q_1, q_2, q_3, q_4, q_5, q_6, q_7,
        q_8, q_9, q_10, q_11, q_12, q_13, q_14, q_15]

instances:
  - {name: ff_0,  component: dff, params: {init: 0}}
  - {name: ff_1,  component: dff, params: {init: 0}}
  - {name: ff_2,  component: dff, params: {init: 0}}
  - {name: ff_3,  component: dff, params: {init: 0}}
  - {name: ff_4,  component: dff, params: {init: 0}}
  - {name: ff_5,  component: dff, params: {init: 0}}
  - {name: ff_6,  component: dff, params: {init: 0}}
  - {name: ff_7,  component: dff, params: {init: 0}}
  - {name: ff_8,  component: dff, params: {init: 0}}
  - {name: ff_9,  component: dff, params: {init: 0}}
  - {name: ff_10, component: dff, params: {init: 0}}
  - {name: ff_11, component: dff, params: {init: 0}}
  - {name: ff_12, component: dff, params: {init: 0}}
  - {name: ff_13, component: dff, params: {init: 0}}
  - {name: ff_14, component: dff, params: {init: 0}}
  - {name: ff_15, component: dff, params: {init: 0}}

connections:
  - {net: [d_0,   ff_0.d]}
  - {net: [en_0,  ff_0.en]}
  - {net: [ff_0.q,  q_0]}
  - {net: [d_1,   ff_1.d]}
  - {net: [en_1,  ff_1.en]}
  - {net: [ff_1.q,  q_1]}
