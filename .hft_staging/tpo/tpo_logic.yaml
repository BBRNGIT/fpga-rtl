# ⛔ OBSOLETE — DO NOT EMIT. Contradicts the Index Doctrine (CLAUDE.md Law #10).
#    Uses the retired store-and-allocate model (level_ring price-key slots + TPO_ALLOC_CUR);
#    gate-blocked by checks/check_index_doctrine.py. Rewrite as a direct price-indexed
#    projection (count time-touches per price from DOM's per-tick payload over the bar).
#    See memory/index_doctrine_price_time_as_index.md. Historical reference only.
# tpo_logic.yaml — machine-readable flip-flop-level logic spec (V2)
# Companion to TPO_SPEC_V2.md. SPEC ONLY: no addresses, no placement.

module: tpo
kind: indicator
clock: passive    # owns no clock; clock-rule passes quietly

seam_inputs:
  - {name: DOM_BEST_BID_PRICE_REG, from: dom.wiring.best_bid_price}
  - {name: DOM_BEST_ASK_PRICE_REG, from: dom.wiring.best_ask_price}
  - {name: DOM_LAST_FEED_TIME_REG, from: dom.wiring.last_feed_time, note: only if T4 accepted}
  - {name: TF_BAR_SEQ,   from: timeframe.bar_seq}
  - {name: TF_BAR_START, from: timeframe.bar_start}

const_nodes:
  - {name: TPO_ONE,  value: 1}
  - {name: TPO_ZERO, value: 0}
  - {name: TPO_LVL_MASK,  value: 31}   # OPEN DECISION T1
  - {name: TPO_HIST_MASK, value: 15}   # OPEN DECISION T3
  - {name: TPO_PERIODS_PER_SESSION, value: 48}  # OPEN DECISION T2

level_ring:
  name: TPO_LVL
  depth: 32        # OPEN DECISION T1 (power of two)
  bucketing: eqmask(TPO_LVL_PRICE_i, quote_price) AND slot_valid_i (one-hot table select)
  virtual_reset: parity tag per slot vs TPO_BAR_PARITY (flip at session close)
  slots:
    - {name: TPO_LVL_PRICE_i,       fed_by: lvl_price_next_i (mux chain)}
    - {name: TPO_LVL_COUNT_i,       fed_by: lvl_count_next_i (addsub)}
    - {name: TPO_LVL_LAST_PERIOD_i, fed_by: lvl_lastp_next_i (mux)}
    - {name: TPO_LVL_PARITY_i,      fed_by: lvl_parity_next_i (mux)}
    # - {name: TPO_LVL_TIME_i, fed_by: addsub(TPO_LVL_TIME_i, charge_i, 0)}  # only if T4

dff_nodes:
  - {name: TPO_LAST_TF_SEQ,       fed_by: last_tf_next (buf)}
  - {name: TPO_PERIOD_IN_SESSION, fed_by: pis_next (mux)}
  - {name: TPO_SESSION_SEQ,       fed_by: session_seq_next (addsub+mux)}
  - {name: TPO_BAR_PARITY,        fed_by: parity_next (xor+mux)}   # session parity
  - {name: TPO_POC_PRICE,         fed_by: poc_price_next (mux, argmax chain)}
  - {name: TPO_POC_COUNT,         fed_by: poc_count_next (mux, argmax chain)}
  - {name: TPO_MIN_PRICE,         fed_by: min_price_next (cmp_lt+mux, seeded)}
  - {name: TPO_MAX_PRICE,         fed_by: max_price_next (cmp_lt+mux, seeded)}
  - {name: TPO_MIN_SET,           fed_by: min_set_next (mux)}
  - {name: TPO_TOTAL,             fed_by: total_next (addsub)}
  - {name: TPO_ALLOC_CUR,         fed_by: alloc_cur_next (addsub+mux)}
  # - {name: TPO_PREV_TAI, fed_by: buf(DOM_LAST_FEED_TIME_REG)}   # only if T4
  # completed-session snapshot, all en=session_close_now
  - {name: TPO_COMP_POC_PRICE,   fed_by: TPO_POC_PRICE (dff en=session_close_now)}
  - {name: TPO_COMP_POC_COUNT,   fed_by: TPO_POC_COUNT}
  - {name: TPO_COMP_MIN_PRICE,   fed_by: TPO_MIN_PRICE}
  - {name: TPO_COMP_MAX_PRICE,   fed_by: TPO_MAX_PRICE}
  - {name: TPO_COMP_TOTAL,       fed_by: TPO_TOTAL}
  - {name: TPO_COMP_TAI,         fed_by: TF_BAR_START}
  - {name: TPO_COMP_SESSION_SEQ, fed_by: TPO_SESSION_SEQ}

history_ring:
  name: TPO_HIST
  depth: 16                      # OPEN DECISION T3 (power of two)
  index: {cell: and, inputs: [TPO_SESSION_SEQ, TPO_HIST_MASK]}
  write_enable: session_close_now
  fed_by: TPO_COMP_* closing values
  fields: [POC_PRICE, POC_COUNT, MIN_PRICE, MAX_PRICE, TOTAL, TAI, SESSION_SEQ]

comb_nodes:
  # period / session boundary
  - {name: period_same,      cell: eqmask, inputs: [TPO_LAST_TF_SEQ, TF_BAR_SEQ]}
  - {name: period_close_now, cell: not, inputs: [period_same], bit0: true,
     fed_to: [harvest enables, pis_inc gate]}
  - {name: pis_step,  cell: gate, inputs: [TPO_ONE, period_close_now]}
  - {name: pis_inc,   cell: addsub, sub: 0, inputs: [TPO_PERIOD_IN_SESSION, pis_step]}
  - {name: session_full, cell: eqmask, inputs: [pis_inc, TPO_PERIODS_PER_SESSION]}
  - {name: session_close_now, cell: and, inputs: [period_close_now, session_full],
     fed_to: [TPO_COMP latches, parity_next, resets, TPO_HIST write enable]}
  - {name: not_session_close, cell: not, inputs: [session_close_now], bit0: true}
  - {name: pis_next, cell: mux, inputs: [pis_inc, TPO_ZERO, session_close_now], fed_to: [TPO_PERIOD_IN_SESSION]}
  - {name: last_tf_next, cell: buf, inputs: [TF_BAR_SEQ], fed_to: [TPO_LAST_TF_SEQ]}
  # level matching / allocation (i = 0..31, generator-unrolled; footprint pattern)
  - {name: slot_valid_i, cell: eqmask, inputs: [TPO_LVL_PARITY_i, TPO_BAR_PARITY], unroll: 32}
  - {name: match_bid_i, cell: and, inputs: [eqmask(TPO_LVL_PRICE_i, DOM_BEST_BID_PRICE_REG), slot_valid_i], unroll: 32}
  - {name: match_ask_i, cell: and, inputs: [eqmask(TPO_LVL_PRICE_i, DOM_BEST_ASK_PRICE_REG), slot_valid_i], unroll: 32}
  - {name: any_match_bid, cell: or, reduce: [match_bid_i]}
  - {name: any_match_ask, cell: or, reduce: [match_ask_i]}
  - {name: alloc_bid, cell: and, inputs: [TPO_ONE, not(any_match_bid)]}   # touch definition: OPEN DECISION T5
  - {name: ask_hits_new_bid, cell: and, inputs: [eqmask(DOM_BEST_ASK_PRICE_REG, DOM_BEST_BID_PRICE_REG), alloc_bid]}
  - {name: alloc_ask, cell: and, inputs: [TPO_ONE, not(any_match_ask), not(ask_hits_new_bid)]}
  - {name: cur0, cell: and, inputs: [TPO_ALLOC_CUR, TPO_LVL_MASK]}
  - {name: cur1, cell: and, inputs: [addsub(TPO_ALLOC_CUR, alloc_bid_bit, 0), TPO_LVL_MASK]}
  - {name: alloc_cur_next, cell: mux, inputs: [addsub(TPO_ALLOC_CUR, addsub(alloc_bid_bit, alloc_ask_bit, 0), 0), TPO_ZERO, session_close_now], fed_to: [TPO_ALLOC_CUR]}
  - {name: alloc_sel_bid_i, cell: and, inputs: [eqmask(slot_const_i, cur0), alloc_bid], unroll: 32}
  - {name: alloc_sel_ask_i, cell: and, inputs: [eqmask(slot_const_i, cur1), alloc_ask], unroll: 32}
  - {name: touched_i, cell: or, inputs: [match_bid_i, match_ask_i, alloc_sel_bid_i, alloc_sel_ask_i], unroll: 32}
  # touch marking
  - {name: lvl_price_next_i, cell: mux, chain: [hold TPO_LVL_PRICE_i, DOM_BEST_BID_PRICE_REG on alloc_sel_bid_i, DOM_BEST_ASK_PRICE_REG on alloc_sel_ask_i], fed_to: [TPO_LVL_PRICE_i], unroll: 32}
  - {name: lvl_lastp_next_i, cell: mux, inputs: [TPO_LVL_LAST_PERIOD_i, TF_BAR_SEQ, touched_i], fed_to: [TPO_LVL_LAST_PERIOD_i], unroll: 32}
  - {name: lvl_parity_next_i, cell: mux, inputs: [TPO_LVL_PARITY_i, TPO_BAR_PARITY, or(alloc_sel_bid_i, alloc_sel_ask_i)], fed_to: [TPO_LVL_PARITY_i], unroll: 32}
  # TPO harvest on period close (the letter accumulation)
  - {name: touched_in_closed_i, cell: eqmask, inputs: [TPO_LVL_LAST_PERIOD_i, TPO_LAST_TF_SEQ], unroll: 32}
  - {name: harvest_bit_i, cell: and, inputs: [touched_in_closed_i, period_close_now, slot_valid_i], bit0: true, unroll: 32}
  - {name: count_base_i, cell: gate, inputs: [TPO_LVL_COUNT_i, and(slot_valid_i, not_session_close)], unroll: 32}
  - {name: lvl_count_next_i, cell: addsub, sub: 0, inputs: [count_base_i, harvest_bit_i], fed_to: [TPO_LVL_COUNT_i], unroll: 32}
  - {name: total_inc, cell: addsub, sub: 0, reduce: [harvest_bit_i], note: balanced adder tree, generator-expanded}
  - {name: total_base, cell: gate, inputs: [TPO_TOTAL, not_session_close]}
  - {name: total_next, cell: addsub, sub: 0, inputs: [total_base, total_inc], fed_to: [TPO_TOTAL]}
  # POC argmax tournament (generator-unrolled chain over slots)
  - {name: poc_c_0, cell: gate, inputs: [lvl_count_next_0, slot_valid_0]}
  - {name: poc_p_0, cell: buf,  inputs: [lvl_price_next_0]}
  - {name: beat_i,  cell: cmp_lt, inputs: [poc_c_prev, gate(lvl_count_next_i, slot_valid_i)], unroll: 31}
  - {name: poc_c_i, cell: mux, inputs: [poc_c_prev, lvl_count_next_i, beat_i], unroll: 31}
  - {name: poc_p_i, cell: mux, inputs: [poc_p_prev, lvl_price_next_i, beat_i], unroll: 31}
  - {name: poc_price_next, cell: mux, inputs: [poc_p_31, TPO_ZERO, session_close_now], fed_to: [TPO_POC_PRICE]}
  - {name: poc_count_next, cell: mux, inputs: [poc_c_31, TPO_ZERO, session_close_now], fed_to: [TPO_POC_COUNT]}
  # session min/max (seeded)
  - {name: is_lower,  cell: cmp_lt, inputs: [DOM_BEST_BID_PRICE_REG, TPO_MIN_PRICE]}
  - {name: min_run,   cell: mux, inputs: [TPO_MIN_PRICE, DOM_BEST_BID_PRICE_REG, is_lower]}
  - {name: min_seeded, cell: mux, inputs: [DOM_BEST_BID_PRICE_REG, min_run, TPO_MIN_SET]}
  - {name: min_price_next, cell: mux, inputs: [min_seeded, TPO_ZERO, session_close_now], fed_to: [TPO_MIN_PRICE]}
  - {name: is_higher, cell: cmp_lt, inputs: [TPO_MAX_PRICE, DOM_BEST_ASK_PRICE_REG]}
  - {name: max_run,   cell: mux, inputs: [TPO_MAX_PRICE, DOM_BEST_ASK_PRICE_REG, is_higher]}
  - {name: max_price_next, cell: mux, inputs: [max_run, TPO_ZERO, session_close_now], fed_to: [TPO_MAX_PRICE]}
  - {name: min_set_next, cell: mux, inputs: [TPO_ONE, TPO_ZERO, session_close_now], fed_to: [TPO_MIN_SET]}
  # session close bookkeeping
  - {name: parity_flip, cell: xor, inputs: [TPO_BAR_PARITY, TPO_ONE]}
  - {name: parity_next, cell: mux, inputs: [TPO_BAR_PARITY, parity_flip, session_close_now], fed_to: [TPO_BAR_PARITY]}
  - {name: session_seq_next, cell: mux, inputs: [TPO_SESSION_SEQ, addsub(TPO_SESSION_SEQ, TPO_ONE, 0), session_close_now], fed_to: [TPO_SESSION_SEQ]}
  - {name: hist_slot_idx, cell: and, inputs: [TPO_SESSION_SEQ, TPO_HIST_MASK], fed_to: [TPO_HIST slot one-hot select]}

wiring:
  inputs:
    DOM_BEST_BID_PRICE_REG: [level match/alloc bid key, session min]
    DOM_BEST_ASK_PRICE_REG: [level match/alloc ask key, session max]
    TF_BAR_SEQ:             [period_same, last_tf_next, lvl_lastp_next]
    TF_BAR_START:           [TPO_COMP_TAI latch]
    DOM_LAST_FEED_TIME_REG: [elapsed-time accumulation (only if T4)]
  on_period_close:
    - harvest +1 into TPO_LVL_COUNT_i for every slot touched in the closed period
    - increment TPO_PERIOD_IN_SESSION; refresh POC chain output
  on_session_close:
    - latch 7 TPO_COMP_*; write TPO_HIST slot (TPO_SESSION_SEQ & mask)
    - flip TPO_BAR_PARITY (virtual-resets all level slots)
    - reset PERIOD_IN_SESSION, POC, min/max/seed, TOTAL, alloc cursor
    - increment TPO_SESSION_SEQ

seam_outputs:
  - {group: TPO_POC_OUT, lanes: [TPO_POC_PRICE, TPO_POC_COUNT]}
  - {group: TPO_RANGE_OUT, lanes: [TPO_MIN_PRICE, TPO_MAX_PRICE]}
  - {group: TPO_PROFILE_OUT, lanes: [TPO_LVL_PRICE_i, TPO_LVL_COUNT_i, TPO_LVL_PARITY_i]}
  - {group: TPO_TOTAL_OUT, lanes: [TPO_TOTAL, TPO_PERIOD_IN_SESSION, TPO_SESSION_SEQ]}
  - {group: TPO_COMP_OUT, lanes: [all TPO_COMP_*]}
  - {group: TPO_HIST_OUT, lanes: [TPO_HIST ring, TPO_SESSION_SEQ]}

open_decisions:
  - {id: T1, topic: level-ring depth, default: 32, alternatives: [16, 64]}
  - {id: T2, topic: periods per session, default: 48 (const TPO_PERIODS_PER_SESSION), alternatives: [24, 96, second timeframe instance seam]}
  - {id: T3, topic: history ring depth, default: 16 sessions, alternatives: [8, 64]}
  - {id: T4, topic: time-at-price accumulators, default: omit, alternatives: [include TPO_LVL_TIME_i + TPO_PREV_TAI via DOM_LAST_FEED_TIME_REG]}
  - {id: T5, topic: touch definition, default: dual (best bid AND best ask), alternatives: [mid-price only]}
