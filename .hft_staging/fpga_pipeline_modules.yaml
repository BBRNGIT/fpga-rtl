# fpga_pipeline_modules.yaml
#
# Module specification for Pipeline FPGA specialization.
#
# This is the INPUT to gen_fpga_specialization.py.
# Describes which modules run on this FPGA, their resource budgets,
# and clock domains. The tool allocates addresses automatically.

fpga_name: pipeline

# Primary clock for this FPGA
clock_primary: 250 MHz internal clock (pll_2x)

# Modules in this FPGA instance
modules:
  - name: internal
    cells: 5
    bram: 0
    clock_domain: internal
    comment: "250 MHz pipeline clock"

  - name: timeframe
    cells: 8
    bram: 0
    clock_domain: internal
    comment: "Base period tick generator, reference for bar modules"

  - name: dom
    cells: 212
    bram: 16
    clock_domain: internal
    comment: "Price-indexed order book, 16384-entry tables, best-price tracking"

  - name: candle
    cells: 64
    bram: 4
    clock_domain: internal
    comment: "Bid/ask OHLC bars, 256-bar history ring, per-module multiplier"

  - name: footprint
    cells: 88
    bram: 4
    clock_domain: internal
    comment: "POC/VAH/VAL + imbalance, per-module multiplier"

  - name: tpo
    cells: 72
    bram: 4
    clock_domain: internal
    comment: "Time-per-price accumulator, per-module multiplier"

  - name: fractal
    cells: 15
    bram: 0
    clock_domain: internal
    comment: "5-bar pivot detector, fractals up/down"

  - name: cbr
    cells: 18
    bram: 0
    clock_domain: internal
    comment: "Cross-bar deltas: volume, true range, cumulative delta"

  - name: pip_resolver
    cells: 20
    bram: 0
    clock_domain: internal
    comment: "PIP precision resolver for trade mechanics"

  - name: strategy
    cells: 150
    bram: 8
    clock_domain: internal
    comment: "Signal generation and decision logic"

  - name: risk
    cells: 100
    bram: 4
    clock_domain: internal
    comment: "Position and exposure limits, circuit breaker"

  - name: oms
    cells: 120
    bram: 8
    clock_domain: internal
    comment: "Order management system, order state machine"

  - name: sor
    cells: 90
    bram: 4
    clock_domain: internal
    comment: "Smart order router, price improvement logic"

  - name: outbound
    cells: 60
    bram: 0
    clock_domain: internal
    comment: "Output formatter, transmit interface to NIC"
