# tai_cdc_logic.yaml — cell-level rebuild of the gray-code 2-FF TAI->MAC synchronizer.
# Faithful to tai_cdc_gen.h (Cummings): gray encode g=in^(in>>1); 2-FF sync; gray
# decode (parallel-prefix XOR fold >>1,2,4,8,16,32) of the stage-2 word.
# LOGICAL >>n built as sar(x,n) & mask_low(64-n); sar via addsub(x,ZERO,shift_right=n)
# (shift_right is a modifier honored on addsub by both gennet and synth).
# mac decodes SYNC2_NEXT (the value latched THIS tick), matching the legacy ordering.
module: tai_cdc
kind: cdc
clock: {power: TAI_CDC_POWER, comment: "self-runs on mac edge while powered, bounded by TAI_CDC_RUN_UNTIL"}
seam_inputs:
  - {name: TAI_CDC_POWER,     type: bit, source: "", comment: "power bit"}
  - {name: TAI_CDC_RUN_UNTIL, type: u64, source: "", comment: "self-run budget (start/stop)"}
  - {name: TAI_IN,            type: u64, source: "", comment: "async TAI value sampled into MAC domain"}
const_nodes:
  - {name: ONE,  type: u64, value: 1, comment: "tick step"}
  - {name: ZERO, type: u64, value: 0, comment: "addsub identity (for shift-only)"}
  - {name: LMASK_1, type: u64, value: 9223372036854775807, comment: "low 63-bit mask for lsr >>1"}
  - {name: LMASK_2, type: u64, value: 4611686018427387903, comment: "low 62-bit mask for lsr >>2"}
  - {name: LMASK_4, type: u64, value: 1152921504606846975, comment: "low 60-bit mask for lsr >>4"}
  - {name: LMASK_8, type: u64, value: 72057594037927935, comment: "low 56-bit mask for lsr >>8"}
  - {name: LMASK_16, type: u64, value: 281474976710655, comment: "low 48-bit mask for lsr >>16"}
  - {name: LMASK_32, type: u64, value: 4294967295, comment: "low 32-bit mask for lsr >>32"}
comb_nodes:
  - {name: ENC_S1_SAR, cell: addsub, inputs: [TAI_IN, ZERO], sub: 0, shift_right: 1, comment: "sar(x,1)"}
  - {name: ENC_S1, cell: and, inputs: [ENC_S1_SAR, LMASK_1], comment: "logical >> 1"}
  - {name: GRAY, cell: xor, inputs: [TAI_IN, ENC_S1], comment: "gray = in ^ (in>>1)"}
  - {name: SYNC1_NEXT, cell: mux, inputs: [TAI_SYNC1_GRAY, GRAY, TAI_CDC_POWER], comment: "stage1 <= gray (en=power)"}
  - {name: SYNC2_NEXT, cell: mux, inputs: [TAI_SYNC2_GRAY, TAI_SYNC1_GRAY, TAI_CDC_POWER], comment: "stage2 <= stage1 (en=power)"}
  - {name: DEC1_LSR_SAR, cell: addsub, inputs: [SYNC2_NEXT, ZERO], sub: 0, shift_right: 1, comment: "sar(x,1)"}
  - {name: DEC1_LSR, cell: and, inputs: [DEC1_LSR_SAR, LMASK_1], comment: "logical >> 1"}
  - {name: DEC1, cell: xor, inputs: [SYNC2_NEXT, DEC1_LSR], comment: "fold >>1"}
  - {name: DEC2_LSR_SAR, cell: addsub, inputs: [DEC1, ZERO], sub: 0, shift_right: 2, comment: "sar(x,2)"}
  - {name: DEC2_LSR, cell: and, inputs: [DEC2_LSR_SAR, LMASK_2], comment: "logical >> 2"}
  - {name: DEC2, cell: xor, inputs: [DEC1, DEC2_LSR], comment: "fold >>2"}
  - {name: DEC4_LSR_SAR, cell: addsub, inputs: [DEC2, ZERO], sub: 0, shift_right: 4, comment: "sar(x,4)"}
  - {name: DEC4_LSR, cell: and, inputs: [DEC4_LSR_SAR, LMASK_4], comment: "logical >> 4"}
  - {name: DEC4, cell: xor, inputs: [DEC2, DEC4_LSR], comment: "fold >>4"}
  - {name: DEC8_LSR_SAR, cell: addsub, inputs: [DEC4, ZERO], sub: 0, shift_right: 8, comment: "sar(x,8)"}
  - {name: DEC8_LSR, cell: and, inputs: [DEC8_LSR_SAR, LMASK_8], comment: "logical >> 8"}
  - {name: DEC8, cell: xor, inputs: [DEC4, DEC8_LSR], comment: "fold >>8"}
  - {name: DEC16_LSR_SAR, cell: addsub, inputs: [DEC8, ZERO], sub: 0, shift_right: 16, comment: "sar(x,16)"}
  - {name: DEC16_LSR, cell: and, inputs: [DEC16_LSR_SAR, LMASK_16], comment: "logical >> 16"}
  - {name: DEC16, cell: xor, inputs: [DEC8, DEC16_LSR], comment: "fold >>16"}
  - {name: DEC32_LSR_SAR, cell: addsub, inputs: [DEC16, ZERO], sub: 0, shift_right: 32, comment: "sar(x,32)"}
  - {name: DEC32_LSR, cell: and, inputs: [DEC32_LSR_SAR, LMASK_32], comment: "logical >> 32"}
  - {name: TAI_MAC_DEC, cell: xor, inputs: [DEC16, DEC32_LSR], comment: "fold >>32"}
  - {name: STEP, cell: gate, inputs: [ONE, TAI_CDC_POWER]}
  - {name: TICKS_NEXT, cell: addsub, inputs: [TAI_CDC_TICKS, STEP], sub: 0}
dff_nodes:
  - {name: TAI_CDC_TICKS,  type: u64, fed_by: TICKS_NEXT, enable: ONE, comment: "self-run budget counter"}
  - {name: TAI_SYNC1_GRAY, type: u64, fed_by: SYNC1_NEXT, enable: ONE, comment: "synchronizer stage 1"}
  - {name: TAI_SYNC2_GRAY, type: u64, fed_by: SYNC2_NEXT, enable: ONE, comment: "synchronizer stage 2 (stable)"}
  - {name: TAI_MAC,        type: u64, fed_by: TAI_MAC_DEC, enable: ONE, comment: "MAC-domain TAI (gray-decoded)"}
seam_outputs:
  - {name: TAI_MAC_OUT, source: TAI_MAC, type: u64, comment: "TAI value in MAC domain"}
