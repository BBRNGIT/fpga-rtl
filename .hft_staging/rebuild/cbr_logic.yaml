# cbr_logic.yaml — cell-level rebuild of the CBR (candle bar-range delta + high-water) indicator.
# Faithful to cbr.net.json:
#   boundary = eqmask(LAST_TF_SEQ, TF_BAR_SEQ) ^ 1     (seq changed)
#   *_DELTA  = addsub(curr, prev, sub=1)               (curr - prev)
#   *_HW     = mux(hw, delta, cmp_lt(hw, delta))       (running max)
#   PREV_*   = mux(prev, curr, boundary)               (adopt curr on bar close)
#   LAST_TF_SEQ = buf(TF_BAR_SEQ)                       (next-cycle boundary edge)
# Pure compute + dffs; no memory.
module: cbr
kind: indicator
seam_inputs:
  - {name: CAND_CURR_BID_VOL, type: u64, source: "", comment: "current candle bid volume"}
  - {name: CAND_CURR_ASK_VOL, type: u64, source: "", comment: "current candle ask volume"}
  - {name: CAND_CURR_BID_TR,  type: u64, source: "", comment: "current candle bid true-range"}
  - {name: CAND_CURR_ASK_TR,  type: u64, source: "", comment: "current candle ask true-range"}
  - {name: CAND_CURR_INTRABAR, type: u64, source: "", comment: "current intrabar qty delta"}
  - {name: FP_CURR_CUM_DELTA, type: u64, source: "", comment: "footprint cumulative delta"}
  - {name: TF_BAR_SEQ_REG,    type: u64, source: "", comment: "bar sequence (timeframe seam)"}
const_nodes:
  - {name: ONE, type: u64, value: 1, comment: "dff enable / boundary flip"}
comb_nodes:
  - {name: BOUNDARY, cell: eqmask, inputs: [CBR_LAST_TF_SEQ_REG, TF_BAR_SEQ_REG], invert: true, comment: "1 iff seq changed (bar committed)"}
  - {name: CBR_BID_VOL_DELTA_REG_UPDATE, cell: addsub, inputs: [CAND_CURR_BID_VOL, CBR_PREV_BID_VOL_REG], sub: 1, comment: "curr - prev"}
  - {name: CBR_ASK_VOL_DELTA_REG_UPDATE, cell: addsub, inputs: [CAND_CURR_ASK_VOL, CBR_PREV_ASK_VOL_REG], sub: 1}
  - {name: CBR_BID_TR_DELTA_REG_UPDATE,  cell: addsub, inputs: [CAND_CURR_BID_TR,  CBR_PREV_BID_TR_REG],  sub: 1}
  - {name: CBR_ASK_TR_DELTA_REG_UPDATE,  cell: addsub, inputs: [CAND_CURR_ASK_TR,  CBR_PREV_ASK_TR_REG],  sub: 1}
  - {name: CBR_FOOTPRINT_DELTA_REG_UPDATE, cell: addsub, inputs: [FP_CURR_CUM_DELTA, CBR_PREV_BID_VOL_REG], sub: 1, comment: "footprint cum delta - prev (boundary-gated chain, §6 note 2)"}
  - {name: CBR_INTRABAR_DELTA_REG_UPDATE,  cell: addsub, inputs: [CAND_CURR_INTRABAR, CBR_PREV_ASK_VOL_REG], sub: 1, comment: "intrabar - prev (boundary-gated chain, §6 note 2)"}
  - {name: CBR_BID_VOL_HW_SEL, cell: cmp_lt, inputs: [CBR_BID_VOL_HW_REG, CBR_BID_VOL_DELTA_REG_UPDATE], comment: "hw < delta"}
  - {name: CBR_BID_VOL_HW_REG_UPDATE, cell: mux, inputs: [CBR_BID_VOL_HW_REG, CBR_BID_VOL_DELTA_REG_UPDATE, CBR_BID_VOL_HW_SEL], comment: "running max"}
  - {name: CBR_ASK_VOL_HW_SEL, cell: cmp_lt, inputs: [CBR_ASK_VOL_HW_REG, CBR_ASK_VOL_DELTA_REG_UPDATE]}
  - {name: CBR_ASK_VOL_HW_REG_UPDATE, cell: mux, inputs: [CBR_ASK_VOL_HW_REG, CBR_ASK_VOL_DELTA_REG_UPDATE, CBR_ASK_VOL_HW_SEL]}
  - {name: CBR_BID_TR_HW_SEL, cell: cmp_lt, inputs: [CBR_BID_TR_HW_REG, CBR_BID_TR_DELTA_REG_UPDATE]}
  - {name: CBR_BID_TR_HW_REG_UPDATE, cell: mux, inputs: [CBR_BID_TR_HW_REG, CBR_BID_TR_DELTA_REG_UPDATE, CBR_BID_TR_HW_SEL]}
  - {name: CBR_ASK_TR_HW_SEL, cell: cmp_lt, inputs: [CBR_ASK_TR_HW_REG, CBR_ASK_TR_DELTA_REG_UPDATE]}
  - {name: CBR_ASK_TR_HW_REG_UPDATE, cell: mux, inputs: [CBR_ASK_TR_HW_REG, CBR_ASK_TR_DELTA_REG_UPDATE, CBR_ASK_TR_HW_SEL]}
  - {name: CBR_PREV_BID_VOL_REG_UPDATE, cell: mux, inputs: [CBR_PREV_BID_VOL_REG, CAND_CURR_BID_VOL, BOUNDARY], comment: "adopt curr on bar close, else hold"}
  - {name: CBR_PREV_ASK_VOL_REG_UPDATE, cell: mux, inputs: [CBR_PREV_ASK_VOL_REG, CAND_CURR_ASK_VOL, BOUNDARY]}
  - {name: CBR_PREV_BID_TR_REG_UPDATE,  cell: mux, inputs: [CBR_PREV_BID_TR_REG,  CAND_CURR_BID_TR,  BOUNDARY]}
  - {name: CBR_PREV_ASK_TR_REG_UPDATE,  cell: mux, inputs: [CBR_PREV_ASK_TR_REG,  CAND_CURR_ASK_TR,  BOUNDARY]}
  - {name: CBR_LAST_TF_SEQ_REG_UPDATE, cell: buf, inputs: [TF_BAR_SEQ_REG], comment: "latch latest seq for next-cycle edge"}
dff_nodes:
  - {name: CBR_BID_VOL_DELTA_REG, type: i64, fed_by: CBR_BID_VOL_DELTA_REG_UPDATE, enable: ONE}
  - {name: CBR_ASK_VOL_DELTA_REG, type: i64, fed_by: CBR_ASK_VOL_DELTA_REG_UPDATE, enable: ONE}
  - {name: CBR_BID_TR_DELTA_REG,  type: i64, fed_by: CBR_BID_TR_DELTA_REG_UPDATE,  enable: ONE}
  - {name: CBR_ASK_TR_DELTA_REG,  type: i64, fed_by: CBR_ASK_TR_DELTA_REG_UPDATE,  enable: ONE}
  - {name: CBR_FOOTPRINT_DELTA_REG, type: i64, fed_by: CBR_FOOTPRINT_DELTA_REG_UPDATE, enable: ONE}
  - {name: CBR_INTRABAR_DELTA_REG,  type: i64, fed_by: CBR_INTRABAR_DELTA_REG_UPDATE,  enable: ONE}
  - {name: CBR_BID_VOL_HW_REG, type: i64, fed_by: CBR_BID_VOL_HW_REG_UPDATE, enable: ONE}
  - {name: CBR_ASK_VOL_HW_REG, type: i64, fed_by: CBR_ASK_VOL_HW_REG_UPDATE, enable: ONE}
  - {name: CBR_BID_TR_HW_REG,  type: i64, fed_by: CBR_BID_TR_HW_REG_UPDATE,  enable: ONE}
  - {name: CBR_ASK_TR_HW_REG,  type: i64, fed_by: CBR_ASK_TR_HW_REG_UPDATE,  enable: ONE}
  - {name: CBR_PREV_BID_VOL_REG, type: u64, fed_by: CBR_PREV_BID_VOL_REG_UPDATE, enable: ONE}
  - {name: CBR_PREV_ASK_VOL_REG, type: u64, fed_by: CBR_PREV_ASK_VOL_REG_UPDATE, enable: ONE}
  - {name: CBR_PREV_BID_TR_REG,  type: u64, fed_by: CBR_PREV_BID_TR_REG_UPDATE,  enable: ONE}
  - {name: CBR_PREV_ASK_TR_REG,  type: u64, fed_by: CBR_PREV_ASK_TR_REG_UPDATE,  enable: ONE}
  - {name: CBR_LAST_TF_SEQ_REG, type: u64, fed_by: CBR_LAST_TF_SEQ_REG_UPDATE, enable: ONE}
  - {name: CBR_BAR_BOUNDARY,    type: u64, fed_by: BOUNDARY, enable: ONE, comment: "registered boundary flag (display)"}
seam_outputs:
  - {name: CBR_FOOTPRINT_DELTA_OUT, source: CBR_FOOTPRINT_DELTA_REG, type: i64}
  - {name: CBR_BID_VOL_HW_OUT,      source: CBR_BID_VOL_HW_REG,      type: i64}
