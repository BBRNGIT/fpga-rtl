module: tai
kind: counter
clock: {power: TAI_POWER, comment: "TAI timestamp counter; self-runs while powered"}
seam_inputs:
  - {name: TAI_POWER,     type: bit, source: "", comment: "power bit"}
  - {name: TAI_RUN_UNTIL, type: u64, source: "", comment: "self-run stop bound"}
const_nodes: [{name: ONE, type: u64, value: 1, comment: "step"}]
comb_nodes:
  - {name: STEP,    cell: gate,   inputs: [ONE, TAI_POWER]}
  - {name: NS_NEXT, cell: addsub, inputs: [TAI_NS, STEP], sub: 0}
dff_nodes:
  - {name: TAI_NS, type: u64, fed_by: NS_NEXT, enable: ONE, comment: "accumulated TAI time"}
seam_outputs:
  - {name: TAI_NS_OUT, source: TAI_NS, type: u64}

# Public display view: TAI time.
display_outputs:
  live: [TAI_NS]
