# dom_logic.yaml — doctrine-aligned cell-level rebuild of DOM (the order book).
#
# DOM has two duties (founder): (1) COMPUTE live market state into registers that
# other modules read; (2) PERSIST its memory as a record store it can snapshot out.
# It does NOT build a "ladder" (a derived view = its own module) and it does NOT use
# a price-indexed anchored table (the legacy 16384 base_px table was a Law #10
# violation: absolute anchor + canvas cap + generalist array decode).
#
# Duty 1 — live state (registers): best bid/ask price+qty, totals, spread, mid,
#   event counters, last-feed-time, prev prices. Pure compute + dffs.
# Duty 2 — persistent memory: a SHIFT-IN record store (Law #10) of the per-tick
#   market payload — each record carries its own coordinates (BID_PX, ASK_PX, TAI)
#   as stored fields, newest at slot 0, NO write-pointer / index / anchor. Maps to
#   fpga_bram. Querying it (by price or time) is a separate parallel-scan module.
#
# Inputs are the consumed fifo_rx head packet lanes via abstract ports (barrier law);
# there is no qty in the price-only feed, so "qty" is presence (1 when level active).
module: dom
kind: orderbook
clock: {power: DOM_POWER, comment: "self-runs on internal edge while powered, bounded by DOM_RUN_UNTIL"}
seam_inputs:
  - {name: DOM_POWER,     type: bit, source: "", comment: "power bit"}
  - {name: DOM_RUN_UNTIL, type: u64, source: "", comment: "self-run budget (start/stop)"}
  - {name: BID_PX,        type: u64, source: "", comment: "fifo head bid price (consumed packet)"}
  - {name: ASK_PX,        type: u64, source: "", comment: "fifo head ask price"}
  - {name: TAI,           type: u64, source: "", comment: "fifo head TAI timestamp"}
  - {name: RD_FIRE,       type: bit, source: "", comment: "fifo read-fire strobe"}
  - {name: FIFO_EMPTY,    type: bit, source: "", comment: "fifo empty flag"}
  - {name: TF_BAR_SEQ,      type: u64, source: "", comment: "timeframe bar seq (relayed onto dom_bus)"}
  - {name: TF_BAR_BOUNDARY, type: bit, source: "", comment: "timeframe bar-closed strobe (relayed)"}
  - {name: TF_BAR_TIME,     type: u64, source: "", comment: "timeframe bar-open TAI (relayed)"}
const_nodes:
  - {name: ONE,  type: u64, value: 1, comment: "tick step / presence qty"}
  - {name: ZERO, type: u64, value: 0, comment: "spread floor / equality probe"}
  - {name: MASK_W, type: u64, value: 7, comment: "width-1 mask (width=8 price-index lanes)"}
  - {name: LANE_0, type: u64, value: 0}
  - {name: LANE_1, type: u64, value: 1}
  - {name: LANE_2, type: u64, value: 2}
  - {name: LANE_3, type: u64, value: 3}
  - {name: LANE_4, type: u64, value: 4}
  - {name: LANE_5, type: u64, value: 5}
  - {name: LANE_6, type: u64, value: 6}
  - {name: LANE_7, type: u64, value: 7}
comb_nodes:
  - {name: STEP,       cell: gate,   inputs: [ONE, DOM_POWER]}
  - {name: TICKS_NEXT, cell: addsub, inputs: [DOM_TICKS, STEP], sub: 0}
  - {name: NEMPTY,  cell: not, inputs: [FIFO_EMPTY], comment: "~empty"}
  - {name: CONSUME, cell: and, inputs: [RD_FIRE, NEMPTY], comment: "rd_fire & ~empty"}
  - {name: EQ_BID,  cell: eqmask, inputs: [BID_PX, DOM_PREV_BID_PRICE]}
  - {name: NE_BID,  cell: not, inputs: [EQ_BID]}
  - {name: BID_CHG, cell: and, inputs: [NE_BID, CONSUME], comment: "bid price changed on a consumed packet"}
  - {name: EQ_ASK,  cell: eqmask, inputs: [ASK_PX, DOM_PREV_ASK_PRICE]}
  - {name: NE_ASK,  cell: not, inputs: [EQ_ASK]}
  - {name: ASK_CHG, cell: and, inputs: [NE_ASK, CONSUME]}
  - {name: BBID_P_N, cell: mux, inputs: [DOM_BEST_BID_PRICE_REG, BID_PX, BID_CHG], comment: "latch new best bid price on change"}
  - {name: BASK_P_N, cell: mux, inputs: [DOM_BEST_ASK_PRICE_REG, ASK_PX, ASK_CHG]}
  - {name: BBID_Q_N, cell: mux, inputs: [DOM_BEST_BID_QTY_REG, ONE, BID_CHG], comment: "presence qty = 1 when active"}
  - {name: BASK_Q_N, cell: mux, inputs: [DOM_BEST_ASK_QTY_REG, ONE, ASK_CHG]}
  - {name: TBID_N,   cell: addsub, inputs: [DOM_TOTAL_BID_QTY_REG, BID_CHG], sub: 0, comment: "total += 1 on a new level"}
  - {name: TASK_N,   cell: addsub, inputs: [DOM_TOTAL_ASK_QTY_REG, ASK_CHG], sub: 0}
  - {name: ASK_EQ0,    cell: eqmask, inputs: [BASK_P_N, ZERO]}
  - {name: ASK_VALID,  cell: not, inputs: [ASK_EQ0], comment: "best ask price != 0"}
  - {name: SPREAD_RAW, cell: addsub, inputs: [BASK_P_N, BBID_P_N], sub: 1, comment: "ask - bid"}
  - {name: MID_RAW,    cell: addsub, inputs: [BBID_P_N, BASK_P_N], sub: 0, shift_right: 1, comment: "(bid+ask)>>1"}
  - {name: SPREAD_N,   cell: mux, inputs: [ZERO, SPREAD_RAW, ASK_VALID]}
  - {name: MID_N,      cell: mux, inputs: [BBID_P_N, MID_RAW, ASK_VALID]}
  - {name: ANY_CHG,  cell: or, inputs: [BID_CHG, ASK_CHG]}
  - {name: PKT_N,    cell: addsub, inputs: [DOM_PKT_COUNT_REG, CONSUME], sub: 0}
  - {name: ADD_N,    cell: addsub, inputs: [DOM_ADD_COUNT_REG, ANY_CHG], sub: 0}
  - {name: CANCEL_N, cell: addsub, inputs: [DOM_CANCEL_COUNT_REG, ANY_CHG], sub: 0}
  - {name: LFT_N,    cell: mux, inputs: [DOM_LAST_FEED_TIME_REG, TAI, CONSUME], comment: "last feed time on consume"}
  - {name: PREV_BID_N, cell: mux, inputs: [DOM_PREV_BID_PRICE, BID_PX, CONSUME]}
  - {name: PREV_ASK_N, cell: mux, inputs: [DOM_PREV_ASK_PRICE, ASK_PX, CONSUME]}
  # per-tick PRICE-INDEXED activity payload (Index Doctrine: price IS the index;
  # lane = price & (width-1) — the position is the price, bounded to the build width.
  # This is DOM's per-tick 'what happened at each price' snapshot; indicators count from it.
  - {name: BID_IDX, cell: and, inputs: [BID_PX, MASK_W], comment: "bid price-index lane"}
  - {name: ASK_IDX, cell: and, inputs: [ASK_PX, MASK_W], comment: "ask price-index lane"}
  - {name: BIDEQ_0, cell: eqmask, inputs: [BID_IDX, LANE_0]}
  - {name: BID_ACT_0, cell: and, inputs: [BIDEQ_0, BID_CHG], comment: "bid activity at price-index 0 this tick"}
  - {name: BIDEQ_1, cell: eqmask, inputs: [BID_IDX, LANE_1]}
  - {name: BID_ACT_1, cell: and, inputs: [BIDEQ_1, BID_CHG], comment: "bid activity at price-index 1 this tick"}
  - {name: BIDEQ_2, cell: eqmask, inputs: [BID_IDX, LANE_2]}
  - {name: BID_ACT_2, cell: and, inputs: [BIDEQ_2, BID_CHG], comment: "bid activity at price-index 2 this tick"}
  - {name: BIDEQ_3, cell: eqmask, inputs: [BID_IDX, LANE_3]}
  - {name: BID_ACT_3, cell: and, inputs: [BIDEQ_3, BID_CHG], comment: "bid activity at price-index 3 this tick"}
  - {name: BIDEQ_4, cell: eqmask, inputs: [BID_IDX, LANE_4]}
  - {name: BID_ACT_4, cell: and, inputs: [BIDEQ_4, BID_CHG], comment: "bid activity at price-index 4 this tick"}
  - {name: BIDEQ_5, cell: eqmask, inputs: [BID_IDX, LANE_5]}
  - {name: BID_ACT_5, cell: and, inputs: [BIDEQ_5, BID_CHG], comment: "bid activity at price-index 5 this tick"}
  - {name: BIDEQ_6, cell: eqmask, inputs: [BID_IDX, LANE_6]}
  - {name: BID_ACT_6, cell: and, inputs: [BIDEQ_6, BID_CHG], comment: "bid activity at price-index 6 this tick"}
  - {name: BIDEQ_7, cell: eqmask, inputs: [BID_IDX, LANE_7]}
  - {name: BID_ACT_7, cell: and, inputs: [BIDEQ_7, BID_CHG], comment: "bid activity at price-index 7 this tick"}
  - {name: ASKEQ_0, cell: eqmask, inputs: [ASK_IDX, LANE_0]}
  - {name: ASK_ACT_0, cell: and, inputs: [ASKEQ_0, ASK_CHG], comment: "ask activity at price-index 0 this tick"}
  - {name: ASKEQ_1, cell: eqmask, inputs: [ASK_IDX, LANE_1]}
  - {name: ASK_ACT_1, cell: and, inputs: [ASKEQ_1, ASK_CHG], comment: "ask activity at price-index 1 this tick"}
  - {name: ASKEQ_2, cell: eqmask, inputs: [ASK_IDX, LANE_2]}
  - {name: ASK_ACT_2, cell: and, inputs: [ASKEQ_2, ASK_CHG], comment: "ask activity at price-index 2 this tick"}
  - {name: ASKEQ_3, cell: eqmask, inputs: [ASK_IDX, LANE_3]}
  - {name: ASK_ACT_3, cell: and, inputs: [ASKEQ_3, ASK_CHG], comment: "ask activity at price-index 3 this tick"}
  - {name: ASKEQ_4, cell: eqmask, inputs: [ASK_IDX, LANE_4]}
  - {name: ASK_ACT_4, cell: and, inputs: [ASKEQ_4, ASK_CHG], comment: "ask activity at price-index 4 this tick"}
  - {name: ASKEQ_5, cell: eqmask, inputs: [ASK_IDX, LANE_5]}
  - {name: ASK_ACT_5, cell: and, inputs: [ASKEQ_5, ASK_CHG], comment: "ask activity at price-index 5 this tick"}
  - {name: ASKEQ_6, cell: eqmask, inputs: [ASK_IDX, LANE_6]}
  - {name: ASK_ACT_6, cell: and, inputs: [ASKEQ_6, ASK_CHG], comment: "ask activity at price-index 6 this tick"}
  - {name: ASKEQ_7, cell: eqmask, inputs: [ASK_IDX, LANE_7]}
  - {name: ASK_ACT_7, cell: and, inputs: [ASKEQ_7, ASK_CHG], comment: "ask activity at price-index 7 this tick"}
  - {name: TOUCH_0, cell: or, inputs: [BID_ACT_0, ASK_ACT_0], comment: "price-index 0 touched (either side)"}
  - {name: TOUCH_1, cell: or, inputs: [BID_ACT_1, ASK_ACT_1], comment: "price-index 1 touched (either side)"}
  - {name: TOUCH_2, cell: or, inputs: [BID_ACT_2, ASK_ACT_2], comment: "price-index 2 touched (either side)"}
  - {name: TOUCH_3, cell: or, inputs: [BID_ACT_3, ASK_ACT_3], comment: "price-index 3 touched (either side)"}
  - {name: TOUCH_4, cell: or, inputs: [BID_ACT_4, ASK_ACT_4], comment: "price-index 4 touched (either side)"}
  - {name: TOUCH_5, cell: or, inputs: [BID_ACT_5, ASK_ACT_5], comment: "price-index 5 touched (either side)"}
  - {name: TOUCH_6, cell: or, inputs: [BID_ACT_6, ASK_ACT_6], comment: "price-index 6 touched (either side)"}
  - {name: TOUCH_7, cell: or, inputs: [BID_ACT_7, ASK_ACT_7], comment: "price-index 7 touched (either side)"}
dff_nodes:
  - {name: DOM_TICKS,             type: u64, fed_by: TICKS_NEXT, enable: ONE, comment: "self-run budget counter"}
  - {name: DOM_PREV_BID_PRICE,    type: u64, fed_by: PREV_BID_N, enable: ONE}
  - {name: DOM_PREV_ASK_PRICE,    type: u64, fed_by: PREV_ASK_N, enable: ONE}
  - {name: DOM_BEST_BID_PRICE_REG, type: u64, fed_by: BBID_P_N, enable: ONE, comment: "live best bid price"}
  - {name: DOM_BEST_ASK_PRICE_REG, type: u64, fed_by: BASK_P_N, enable: ONE}
  - {name: DOM_BEST_BID_QTY_REG,   type: u64, fed_by: BBID_Q_N, enable: ONE}
  - {name: DOM_BEST_ASK_QTY_REG,   type: u64, fed_by: BASK_Q_N, enable: ONE}
  - {name: DOM_TOTAL_BID_QTY_REG,  type: u64, fed_by: TBID_N,   enable: ONE}
  - {name: DOM_TOTAL_ASK_QTY_REG,  type: u64, fed_by: TASK_N,   enable: ONE}
  - {name: DOM_PKT_COUNT_REG,      type: u64, fed_by: PKT_N,    enable: ONE, comment: "packets consumed"}
  - {name: DOM_ADD_COUNT_REG,      type: u64, fed_by: ADD_N,    enable: ONE}
  - {name: DOM_CANCEL_COUNT_REG,   type: u64, fed_by: CANCEL_N, enable: ONE}
  - {name: DOM_LAST_FEED_TIME_REG, type: u64, fed_by: LFT_N,    enable: ONE}
  - {name: DOM_SPREAD_REG,         type: u64, fed_by: SPREAD_N, enable: ONE, comment: "derived spread"}
  - {name: DOM_MID_PRICE_REG,      type: u64, fed_by: MID_N,    enable: ONE, comment: "derived mid"}
history_ring:
  name: DOM_BOOK
  depth: 256
  write_enable: CONSUME
  fields:
    - {name: BID_PX, source: BID_PX}
    - {name: ASK_PX, source: ASK_PX}
    - {name: TAI,    source: TAI}
# Public display view (monitor boundary): entire live DOM output + persistent memory.
display_outputs:
  live: [DOM_BEST_BID_PRICE_REG, DOM_BEST_BID_QTY_REG, DOM_BEST_ASK_PRICE_REG, DOM_BEST_ASK_QTY_REG,
         DOM_SPREAD_REG, DOM_MID_PRICE_REG, DOM_TOTAL_BID_QTY_REG, DOM_TOTAL_ASK_QTY_REG,
         DOM_PKT_COUNT_REG, DOM_ADD_COUNT_REG, DOM_CANCEL_COUNT_REG, DOM_LAST_FEED_TIME_REG]
  memory: {ring: DOM_BOOK, rows: 8, fields: [BID_PX, ASK_PX, TAI]}
# DOM publishes its per-tick snapshot onto dom_bus (sole writer; indicators sample).
# Aggregate lanes — DOM drives these from its own live registers (faithful, no invention).
# The per-price snapshot lanes (DOMBUS_BID_ACT_*/ASK_ACT_*/TOUCH_*), the bar lanes,
# and DOMBUS_TRADE_COUNT/VALID are NOT published here — they await design (per-price
# mapping = Index-Doctrine decision; bar relay from timeframe; no trades in price-only feed).
seam_outputs:
  - {name: DOMBUS_BEST_BID,       source: DOM_BEST_BID_PRICE_REG, type: u64}
  - {name: DOMBUS_BEST_ASK,       source: DOM_BEST_ASK_PRICE_REG, type: u64}
  - {name: DOMBUS_BEST_BID_QTY,   source: DOM_BEST_BID_QTY_REG,   type: u64}
  - {name: DOMBUS_BEST_ASK_QTY,   source: DOM_BEST_ASK_QTY_REG,   type: u64}
  - {name: DOMBUS_SPREAD,         source: DOM_SPREAD_REG,         type: u64}
  - {name: DOMBUS_MID,            source: DOM_MID_PRICE_REG,      type: u64}
  - {name: DOMBUS_TOTAL_BID_QTY,  source: DOM_TOTAL_BID_QTY_REG,  type: u64}
  - {name: DOMBUS_TOTAL_ASK_QTY,  source: DOM_TOTAL_ASK_QTY_REG,  type: u64}
  - {name: DOMBUS_ADD_COUNT,      source: DOM_ADD_COUNT_REG,      type: u64}
  - {name: DOMBUS_CANCEL_COUNT,   source: DOM_CANCEL_COUNT_REG,   type: u64}
  - {name: DOMBUS_LAST_FEED_TIME, source: DOM_LAST_FEED_TIME_REG, type: u64}
  - {name: DOMBUS_BID_ACT_0, source: BID_ACT_0, type: u64}
  - {name: DOMBUS_BID_ACT_1, source: BID_ACT_1, type: u64}
  - {name: DOMBUS_BID_ACT_2, source: BID_ACT_2, type: u64}
  - {name: DOMBUS_BID_ACT_3, source: BID_ACT_3, type: u64}
  - {name: DOMBUS_BID_ACT_4, source: BID_ACT_4, type: u64}
  - {name: DOMBUS_BID_ACT_5, source: BID_ACT_5, type: u64}
  - {name: DOMBUS_BID_ACT_6, source: BID_ACT_6, type: u64}
  - {name: DOMBUS_BID_ACT_7, source: BID_ACT_7, type: u64}
  - {name: DOMBUS_ASK_ACT_0, source: ASK_ACT_0, type: u64}
  - {name: DOMBUS_ASK_ACT_1, source: ASK_ACT_1, type: u64}
  - {name: DOMBUS_ASK_ACT_2, source: ASK_ACT_2, type: u64}
  - {name: DOMBUS_ASK_ACT_3, source: ASK_ACT_3, type: u64}
  - {name: DOMBUS_ASK_ACT_4, source: ASK_ACT_4, type: u64}
  - {name: DOMBUS_ASK_ACT_5, source: ASK_ACT_5, type: u64}
  - {name: DOMBUS_ASK_ACT_6, source: ASK_ACT_6, type: u64}
  - {name: DOMBUS_ASK_ACT_7, source: ASK_ACT_7, type: u64}
  - {name: DOMBUS_TOUCH_0, source: TOUCH_0, type: u64}
  - {name: DOMBUS_TOUCH_1, source: TOUCH_1, type: u64}
  - {name: DOMBUS_TOUCH_2, source: TOUCH_2, type: u64}
  - {name: DOMBUS_TOUCH_3, source: TOUCH_3, type: u64}
  - {name: DOMBUS_TOUCH_4, source: TOUCH_4, type: u64}
  - {name: DOMBUS_TOUCH_5, source: TOUCH_5, type: u64}
  - {name: DOMBUS_TOUCH_6, source: TOUCH_6, type: u64}
  - {name: DOMBUS_TOUCH_7, source: TOUCH_7, type: u64}
  - {name: DOMBUS_BAR_SEQ,      source: TF_BAR_SEQ,      type: u64, comment: "relayed from timeframe"}
  - {name: DOMBUS_BAR_BOUNDARY, source: TF_BAR_BOUNDARY, type: bit, comment: "relayed from timeframe"}
  - {name: DOMBUS_BAR_TIME,     source: TF_BAR_TIME,     type: u64, comment: "relayed from timeframe"}
  - {name: DOMBUS_TRADE_COUNT,  source: ZERO,            type: u64, comment: "price-only feed: no trades"}
  - {name: DOMBUS_VALID,        source: CONSUME,         type: bit, comment: "a packet was consumed this tick"}
  - {name: DOM_RD_EN_OUT,       source: DOM_POWER,       type: bit, comment: "DOM requests a read while powered (reader-controlled handshake)"}
