# pip_resolver_logic.yaml — cell-level rebuild of the per-symbol pip-resolution lookup.
# Faithful to pip_resolver_gen.h:
#   idx = symbol & MASK(=depth-1)                       (power-of-two mask, no %)
#   res = OR_i( gate(table[i], eqmask(idx, i)) )         (branchless slot select)
#   PIP_RESOLUTION <= res  (en=valid) ; PIP_SYMBOL <= symbol (en=valid)
#   PIP_VALID <= valid (en=power)
# Static table (16 power-of-two slots) is config-only (set once by starter).
# NIC seam (SEAM_SYMBOL/SEAM_VALID) sampled via abstract ports (barrier-bus law).
module: pip_resolver
kind: lookup
clock: {power: PIP_POWER, comment: "self-runs on mac edge while powered, bounded by PIP_RUN_UNTIL"}
seam_inputs:
  - {name: PIP_POWER,     type: bit, source: "", comment: "power bit (set once)"}
  - {name: PIP_RUN_UNTIL, type: u64, source: "", comment: "self-run tick budget (start/stop bound)"}
  - {name: SEAM_SYMBOL,   type: u64, source: "", comment: "NIC seam symbol lane (barrier sample)"}
  - {name: SEAM_VALID,    type: bit, source: "", comment: "NIC seam valid lane"}
  - {name: PIP_CFG_TABLE_0,  type: u64, source: "", comment: "static pip-config slot 0 (config-only)"}
  - {name: PIP_CFG_TABLE_1,  type: u64, source: "", comment: "slot 1"}
  - {name: PIP_CFG_TABLE_2,  type: u64, source: "", comment: "slot 2"}
  - {name: PIP_CFG_TABLE_3,  type: u64, source: "", comment: "slot 3"}
  - {name: PIP_CFG_TABLE_4,  type: u64, source: "", comment: "slot 4"}
  - {name: PIP_CFG_TABLE_5,  type: u64, source: "", comment: "slot 5"}
  - {name: PIP_CFG_TABLE_6,  type: u64, source: "", comment: "slot 6"}
  - {name: PIP_CFG_TABLE_7,  type: u64, source: "", comment: "slot 7"}
  - {name: PIP_CFG_TABLE_8,  type: u64, source: "", comment: "slot 8"}
  - {name: PIP_CFG_TABLE_9,  type: u64, source: "", comment: "slot 9"}
  - {name: PIP_CFG_TABLE_10, type: u64, source: "", comment: "slot 10"}
  - {name: PIP_CFG_TABLE_11, type: u64, source: "", comment: "slot 11"}
  - {name: PIP_CFG_TABLE_12, type: u64, source: "", comment: "slot 12"}
  - {name: PIP_CFG_TABLE_13, type: u64, source: "", comment: "slot 13"}
  - {name: PIP_CFG_TABLE_14, type: u64, source: "", comment: "slot 14"}
  - {name: PIP_CFG_TABLE_15, type: u64, source: "", comment: "slot 15"}
const_nodes:
  - {name: ONE,  type: u64, value: 1,  comment: "tick step"}
  - {name: MASK, type: u64, value: 15, comment: "depth-1 power-of-two mask (depth=16)"}
  - {name: IDX_0,  type: u64, value: 0}
  - {name: IDX_1,  type: u64, value: 1}
  - {name: IDX_2,  type: u64, value: 2}
  - {name: IDX_3,  type: u64, value: 3}
  - {name: IDX_4,  type: u64, value: 4}
  - {name: IDX_5,  type: u64, value: 5}
  - {name: IDX_6,  type: u64, value: 6}
  - {name: IDX_7,  type: u64, value: 7}
  - {name: IDX_8,  type: u64, value: 8}
  - {name: IDX_9,  type: u64, value: 9}
  - {name: IDX_10, type: u64, value: 10}
  - {name: IDX_11, type: u64, value: 11}
  - {name: IDX_12, type: u64, value: 12}
  - {name: IDX_13, type: u64, value: 13}
  - {name: IDX_14, type: u64, value: 14}
  - {name: IDX_15, type: u64, value: 15}
comb_nodes:
  - {name: IDX,  cell: and, inputs: [SEAM_SYMBOL, MASK], comment: "symbol & (depth-1)"}
  - {name: EQ_0,  cell: eqmask, inputs: [IDX, IDX_0]}
  - {name: EQ_1,  cell: eqmask, inputs: [IDX, IDX_1]}
  - {name: EQ_2,  cell: eqmask, inputs: [IDX, IDX_2]}
  - {name: EQ_3,  cell: eqmask, inputs: [IDX, IDX_3]}
  - {name: EQ_4,  cell: eqmask, inputs: [IDX, IDX_4]}
  - {name: EQ_5,  cell: eqmask, inputs: [IDX, IDX_5]}
  - {name: EQ_6,  cell: eqmask, inputs: [IDX, IDX_6]}
  - {name: EQ_7,  cell: eqmask, inputs: [IDX, IDX_7]}
  - {name: EQ_8,  cell: eqmask, inputs: [IDX, IDX_8]}
  - {name: EQ_9,  cell: eqmask, inputs: [IDX, IDX_9]}
  - {name: EQ_10, cell: eqmask, inputs: [IDX, IDX_10]}
  - {name: EQ_11, cell: eqmask, inputs: [IDX, IDX_11]}
  - {name: EQ_12, cell: eqmask, inputs: [IDX, IDX_12]}
  - {name: EQ_13, cell: eqmask, inputs: [IDX, IDX_13]}
  - {name: EQ_14, cell: eqmask, inputs: [IDX, IDX_14]}
  - {name: EQ_15, cell: eqmask, inputs: [IDX, IDX_15]}
  - {name: SEL_0,  cell: gate, inputs: [PIP_CFG_TABLE_0,  EQ_0]}
  - {name: SEL_1,  cell: gate, inputs: [PIP_CFG_TABLE_1,  EQ_1]}
  - {name: SEL_2,  cell: gate, inputs: [PIP_CFG_TABLE_2,  EQ_2]}
  - {name: SEL_3,  cell: gate, inputs: [PIP_CFG_TABLE_3,  EQ_3]}
  - {name: SEL_4,  cell: gate, inputs: [PIP_CFG_TABLE_4,  EQ_4]}
  - {name: SEL_5,  cell: gate, inputs: [PIP_CFG_TABLE_5,  EQ_5]}
  - {name: SEL_6,  cell: gate, inputs: [PIP_CFG_TABLE_6,  EQ_6]}
  - {name: SEL_7,  cell: gate, inputs: [PIP_CFG_TABLE_7,  EQ_7]}
  - {name: SEL_8,  cell: gate, inputs: [PIP_CFG_TABLE_8,  EQ_8]}
  - {name: SEL_9,  cell: gate, inputs: [PIP_CFG_TABLE_9,  EQ_9]}
  - {name: SEL_10, cell: gate, inputs: [PIP_CFG_TABLE_10, EQ_10]}
  - {name: SEL_11, cell: gate, inputs: [PIP_CFG_TABLE_11, EQ_11]}
  - {name: SEL_12, cell: gate, inputs: [PIP_CFG_TABLE_12, EQ_12]}
  - {name: SEL_13, cell: gate, inputs: [PIP_CFG_TABLE_13, EQ_13]}
  - {name: SEL_14, cell: gate, inputs: [PIP_CFG_TABLE_14, EQ_14]}
  - {name: SEL_15, cell: gate, inputs: [PIP_CFG_TABLE_15, EQ_15]}
  - {name: ACC_1,  cell: or, inputs: [SEL_0,  SEL_1]}
  - {name: ACC_2,  cell: or, inputs: [ACC_1,  SEL_2]}
  - {name: ACC_3,  cell: or, inputs: [ACC_2,  SEL_3]}
  - {name: ACC_4,  cell: or, inputs: [ACC_3,  SEL_4]}
  - {name: ACC_5,  cell: or, inputs: [ACC_4,  SEL_5]}
  - {name: ACC_6,  cell: or, inputs: [ACC_5,  SEL_6]}
  - {name: ACC_7,  cell: or, inputs: [ACC_6,  SEL_7]}
  - {name: ACC_8,  cell: or, inputs: [ACC_7,  SEL_8]}
  - {name: ACC_9,  cell: or, inputs: [ACC_8,  SEL_9]}
  - {name: ACC_10, cell: or, inputs: [ACC_9,  SEL_10]}
  - {name: ACC_11, cell: or, inputs: [ACC_10, SEL_11]}
  - {name: ACC_12, cell: or, inputs: [ACC_11, SEL_12]}
  - {name: ACC_13, cell: or, inputs: [ACC_12, SEL_13]}
  - {name: ACC_14, cell: or, inputs: [ACC_13, SEL_14]}
  - {name: RES,    cell: or, inputs: [ACC_14, SEL_15], comment: "OR-reduced resolved pip value"}
  - {name: SYM_BUF,   cell: buf, inputs: [SEAM_SYMBOL], comment: "latched symbol"}
  - {name: VALID_BUF, cell: buf, inputs: [SEAM_VALID],  comment: "latched valid"}
  - {name: STEP,       cell: gate,   inputs: [ONE, PIP_POWER], comment: "1 while powered"}
  - {name: TICKS_NEXT, cell: addsub, inputs: [PIP_TICKS, STEP], sub: 0, comment: "self-run counter += step"}
dff_nodes:
  - {name: PIP_TICKS,          type: u64, fed_by: TICKS_NEXT, enable: ONE,        comment: "self-run budget counter"}
  - {name: PIP_RESOLUTION_REG, type: u64, fed_by: RES,        enable: SEAM_VALID, comment: "resolved pip value (the Y-axis resolution authority)"}
  - {name: PIP_SYMBOL,         type: u64, fed_by: SYM_BUF,    enable: SEAM_VALID, comment: "symbol resolved (latched)"}
  - {name: PIP_VALID,          type: bit, fed_by: VALID_BUF,  enable: PIP_POWER,  comment: "valid latch"}
seam_outputs:
  - {name: PIP_RESOLUTION_OUT, source: PIP_RESOLUTION_REG, type: u64, comment: "unified Y-axis pip resolution (read by grid/DOM/footprint/tpo)"}
  - {name: PIP_VALID_OUT,      source: PIP_VALID,          type: bit, comment: "resolution valid"}
