# fifo_rx_logic.yaml — cell-level rebuild of the MAC->internal async CDC FIFO (Cummings).
# (n+1)-bit gray pointers through dual 2-FF synchronizers; FULL/EMPTY from the synced
# opposite-domain pointer; 512 packet-wide slots (8 nic-seam lanes each).
# The RAM is an ADDRESSED block (ram:) -> BRAM with offset addressing (the runtime
# write index drives the BRAM cell offset, a real address port) — NO fabric decode.
# bin2gray uses logical >>1 (addsub shift_right + mask). Read is at the consumer seam.
module: fifo_rx
kind: fifo
clock: {power: FIFO_POWER, comment: "self-runs while powered, bounded by FIFO_RUN_UNTIL"}
seam_inputs:
  - {name: FIFO_POWER,     type: bit, source: ""}
  - {name: FIFO_RUN_UNTIL, type: u64, source: ""}
  - {name: FIFO_RD_EN,     type: bit, source: "", comment: "consumer read-enable"}
  - {name: NIC_SEAM_STROBE, type: bit, source: "", comment: "producer write strobe"}
  - {name: NIC_SEAM_BID_PX, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_ASK_PX, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_TIME, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_SRC_TIME, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_SYMBOL, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_PIP, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_COMMISSION, type: u64, source: "", comment: "nic seam lane"}
  - {name: NIC_SEAM_SEQ, type: u64, source: "", comment: "nic seam lane"}
const_nodes:
  - {name: ONE,  type: u64, value: 1}
  - {name: ZERO, type: u64, value: 0}
  - {name: SLOT_MASK, type: u64, value: 511, comment: "depth-1"}
  - {name: TOP2_MASK, type: u64, value: 768, comment: "3<<(ptr_bits-2), ptr_bits=10"}
  - {name: LMASK_1, type: u64, value: 9223372036854775807, comment: "low 63-bit mask for lsr >>1"}
comb_nodes:
  - {name: WR_IDX, cell: and, inputs: [FIFO_WR_BIN, SLOT_MASK]}
  - {name: EMPTY, cell: eqmask, inputs: [FIFO_RD_GRAY, FIFO_RQ2_WGRAY]}
  - {name: FULL_CMP, cell: xor, inputs: [FIFO_WQ2_RGRAY, TOP2_MASK]}
  - {name: FULL, cell: eqmask, inputs: [FIFO_WR_GRAY, FULL_CMP]}
  - {name: NFULL, cell: not, inputs: [FULL]}
  - {name: WR_FIRE, cell: and, inputs: [NIC_SEAM_STROBE, NFULL]}
  - {name: NEMPTY, cell: not, inputs: [EMPTY]}
  - {name: RD_FIRE, cell: and, inputs: [FIFO_RD_EN, NEMPTY]}
  - {name: WR_BIN_N, cell: addsub, inputs: [FIFO_WR_BIN, WR_FIRE], sub: 0}
  - {name: RD_BIN_N, cell: addsub, inputs: [FIFO_RD_BIN, RD_FIRE], sub: 0}
  - {name: WG_SAR, cell: addsub, inputs: [WR_BIN_N, ZERO], sub: 0, shift_right: 1}
  - {name: WG_LSR, cell: and, inputs: [WG_SAR, LMASK_1]}
  - {name: WR_GRAY_N, cell: xor, inputs: [WR_BIN_N, WG_LSR], comment: "bin2gray"}
  - {name: RG_SAR, cell: addsub, inputs: [RD_BIN_N, ZERO], sub: 0, shift_right: 1}
  - {name: RG_LSR, cell: and, inputs: [RG_SAR, LMASK_1]}
  - {name: RD_GRAY_N, cell: xor, inputs: [RD_BIN_N, RG_LSR]}
  - {name: WQ1_N, cell: mux, inputs: [FIFO_WQ1_RGRAY, FIFO_RD_GRAY, FIFO_POWER]}
  - {name: WQ2_N, cell: mux, inputs: [FIFO_WQ2_RGRAY, FIFO_WQ1_RGRAY, FIFO_POWER]}
  - {name: RQ1_N, cell: mux, inputs: [FIFO_RQ1_WGRAY, FIFO_WR_GRAY, FIFO_POWER]}
  - {name: RQ2_N, cell: mux, inputs: [FIFO_RQ2_WGRAY, FIFO_RQ1_WGRAY, FIFO_POWER]}
  - {name: STEP, cell: gate, inputs: [ONE, FIFO_POWER]}
  - {name: TICKS_NEXT, cell: addsub, inputs: [FIFO_TICKS, STEP], sub: 0}
dff_nodes:
  - {name: FIFO_TICKS,     type: u64, fed_by: TICKS_NEXT, enable: ONE}
  - {name: FIFO_WR_BIN,    type: u64, fed_by: WR_BIN_N,  enable: ONE}
  - {name: FIFO_RD_BIN,    type: u64, fed_by: RD_BIN_N,  enable: ONE}
  - {name: FIFO_WR_GRAY,   type: u64, fed_by: WR_GRAY_N, enable: ONE}
  - {name: FIFO_RD_GRAY,   type: u64, fed_by: RD_GRAY_N, enable: ONE}
  - {name: FIFO_WQ1_RGRAY, type: u64, fed_by: WQ1_N, enable: ONE}
  - {name: FIFO_WQ2_RGRAY, type: u64, fed_by: WQ2_N, enable: ONE}
  - {name: FIFO_RQ1_WGRAY, type: u64, fed_by: RQ1_N, enable: ONE}
  - {name: FIFO_RQ2_WGRAY, type: u64, fed_by: RQ2_N, enable: ONE}
  - {name: FIFO_FULL,    type: bit, fed_by: FULL,    enable: ONE}
  - {name: FIFO_EMPTY,   type: bit, fed_by: EMPTY,   enable: ONE}
  - {name: FIFO_WR_FIRE, type: bit, fed_by: WR_FIRE, enable: ONE}
  - {name: FIFO_RD_FIRE, type: bit, fed_by: RD_FIRE, enable: ONE}
ram:
  name: FIFO_SLOT
  depth: 512
  wr_index: WR_IDX
  wr_fire: WR_FIRE
  lanes:
    - {name: BID_PX, source: NIC_SEAM_BID_PX}
    - {name: ASK_PX, source: NIC_SEAM_ASK_PX}
    - {name: TIME, source: NIC_SEAM_TIME}
    - {name: SRC_TIME, source: NIC_SEAM_SRC_TIME}
    - {name: SYMBOL, source: NIC_SEAM_SYMBOL}
    - {name: PIP, source: NIC_SEAM_PIP}
    - {name: COMMISSION, source: NIC_SEAM_COMMISSION}
    - {name: SEQ, source: NIC_SEAM_SEQ}
seam_outputs:
  - {name: FIFO_EMPTY_OUT, source: FIFO_EMPTY, type: bit}
  - {name: FIFO_RD_FIRE_OUT, source: FIFO_RD_FIRE, type: bit}
