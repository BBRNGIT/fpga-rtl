# composition.yaml — LAYERS 1-3: the composition grammar. How cells compose into
# primitives, primitives into modules, modules into the device.
#
# This file is POPULATED FROM THE DB (cache.db) — not authored by hand. Each entry's
# ports come from the reference doc's port table (cited); each entry's internal
# composition comes from where the reference documents it (cited). Where the db does
# NOT document a decomposition, the entry is marked `decomposition: PENDING` with the
# cite of its declaration page — an OPEN ITEM, never a guess.
#
# version: 0.1  | grammar below; entries filled by the populate step (db -> this file).

grammar:
  layer1_primitive:
    is: "a named device primitive (LUT6, CARRY8, FDRE, DSP48E2, MMCM, ...)"
    ports_from: "its port table in the db (cited doc,page)"
    composed_of: "cells.yaml entries (digital) and/or analog boundaries"
    rule: "every primitive's ports come from the db; every internal cell is in cells.yaml"
  layer2_module:
    is: "a functional subsystem (Clocking, DSP, Memory, IO, Transceiver, Config, PS)"
    composed_of: "layer1 primitives, wired"
    done: "fully C, fully wired, fully working (see done.yaml) — DONE LIVES HERE"
  layer3_device:
    is: "XCZU19EG"
    composed_of: "all layer2 modules at authentic DS891 counts"

# --- ENTRIES (filled from db; example shows the required shape) ---------------
# Each real entry is generated by querying the db: ports from the port table,
# decomposition from the documented internal cells, count from DS891. Example:
primitives:
  - name: CARRY8
    ports_source: "ug974 p241"          # the port table the ports are read from
    ports:                              # FULL port objects from the db row — width = wire vs lane
      - { name: CI,     dir: in,  width: 1, bus: false }
      - { name: CI_TOP, dir: in,  width: 1, bus: false }
      - { name: CO,     dir: out, width: 8, bus: true, range: "7:0" }   # 8-bit LANE
      - { name: DI,     dir: in,  width: 8, bus: true, range: "7:0" }   # 8-bit LANE
      - { name: O,      dir: out, width: 8, bus: true, range: "7:0" }   # 8-bit LANE
      - { name: S,      dir: in,  width: 8, bus: true, range: "7:0" }   # 8-bit LANE
    decomposition: PENDING              # ug974 p241: "8 MUX + 8 XOR carry chain"
    decomposition_note: "8-stage carry: each stage = MUX2 (carry select) + XOR (sum), a
                         lane-of-8 of single-bit cells; the 8-bit ports are 8 parallel bits.
                         fill the exact wiring from p241 text."
  # ... (remaining ~147 primitives populated the same way, each port a full {name,dir,width} object)

modules:
  - name: Clocking
    source: "ug572"
    primitives: [BUFGCE, BUFGCTRL, BUFGCE_DIV, BUFG, MMCM, PLL]   # <- from db, the clocking primitives
    # MMCM/PLL internally use analog cells VCO/PFD/CHARGE_PUMP/LOOP_FILTER (cells.yaml, cited ug572 p35)

# RULE (enforced): every `ports` list must equal the db port table at `ports_source`.
# every cell/primitive referenced must exist in cells.yaml / this file.
# `decomposition: PENDING` is a legal OPEN ITEM (visible work), never a fabricated gate list.
