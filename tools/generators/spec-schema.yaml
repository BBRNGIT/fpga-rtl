# Canonical Specification Schema for RTL Modules
# This schema captures the common structure across all emitter (gen_*_net.py) files
# Extracted from: taiosc, tai, mac, internal, wire, adapter, nic, fifo_rx, dom, timeframe

# Top-level required fields
device: string                    # module name (e.g., "footprint")
kind: string                      # "oscillator" | "clock" | "gateway" | "accumulator" | "memory" | "indicator"
comment: string                   # description of the module

# Optional: Window assignment (NEW ARCHITECTURE: not pre-assigned)
window_base: null                 # null = assigned at init; no pre-assignment

# Register declarations (the circuit's state)
config_nodes:                     # Input configuration (set once at init)
  - name: string                  # register name
    type: string                  # "bit" | "u64" (always u64 or bit, no floats)
    comment: string

dff_nodes:                        # Registered flip-flops (sequential state)
  - name: string
    type: string
    comment: string

buffer_nodes:                     # Optional: external input lanes (for modules reading files/streams)
  - name: string
    type: string
    comment: string

tables:                           # Optional: array registers (indexed by address/index)
  - name: string
    type: string
    depth: integer                # power of 2 (e.g., 16384 for price-indexed)
    index_from: string            # which register/input provides the index
    comment: string

history_ring:                     # Optional: committed history (per-bar snapshot)
  depth: integer                  # power of 2 (ring slots)
  fields:                         # fields per slot
    - name: string
      type: string
  comment: string

cross_module_inputs:              # Optional: reads from other modules' published lanes
  - name: string                  # external register name (e.g., "WIRE_VALID")
    source: string                # source module (e.g., "wire", "tai_cdc")
    type: string
    comment: string

# Combinational logic (branchless gate expressions)
comb_nodes:                       # Optional: combinational (no state)
  - name: string                  # output wire name
    cell: string                  # "mux" | "and" | "or" | "xor" | "not" | "eqmask" | "cmp_lt" | "addsub" | "gate"
    inputs: list of strings       # operands (register names)
    comment: string

# Clock / self-run model (for clocks and counters)
counter:                          # Optional: designates a register as a counter
  reg: string                     # which dff to increment
  power: string                   # gate: increment only when this bit == 1

edge:                             # Optional: designates a strobe output
  reg: string                     # which dff emits the edge
  power: string                   # gate: strobe only when this bit == 1

run_power: string                 # Optional: power bit that gates self-run loop

run_bound:                        # Optional: bounded self-run (stop condition)
  count: string                   # counter register to check
  limit: string                   # limit register; stop when count >= limit

# Data deposits (writing to passive buses)
deposit:                          # Optional: write outputs to a shared bus (e.g., wire)
  target: string                  # bus name (e.g., "wire_bus")
  lanes:
    - bus: string                 # target bus lane
      from: string                # source register/wire

# Display (read-only snapshot ring for TUI)
display_ring:                     # Optional: snapshot for external display
  depth: integer                  # power of 2
  fields: list of strings         # which registers to snapshot
  stride: integer                 # fields per slot
  count: string                   # counter register for ring index

# Seam outputs (published lanes for downstream consumers)
seam_nodes:                       # Optional: gated-dff outputs (written on strobe)
  - name: string
    from: string                  # source
    type: string
    comment: string

# Specialized for footprint, TPO, candle, etc. (indicator-specific)
imbalance:                        # Optional: diagonal imbalance logic
  threshold_bps: integer          # basis points (e.g., 100 = 1%)
  level_down: string              # neighbor level (e.g., P-1)
  level_up: string                # neighbor level (e.g., P+1)

division_pipeline:                # Optional: DSP division (staged across ticks)
  stages: integer                 # typically 4
  numerators: list of strings     # numerator registers
  denominators: list of strings   # denominator registers
  results: list of strings        # result registers

# Clock domain (for multi-domain modules)
clock_domain: string              # Optional: "mac" | "internal" | "pipeline" | etc.
