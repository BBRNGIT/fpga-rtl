device: tpo
kind: indicator
comment: Time Price Opportunity - time-in-price profile, bar-level POC tracking

config_nodes:
  - name: TPO_TIMEFRAME_SLOTS
    type: u64
    comment: History ring depth (power of 2)

cross_module_inputs:
  - name: DOM_BID_QTY
    source: dom
    type: u64
    comment: Bid quantity per price level (indexed by PRICE_IDX)
  - name: DOM_ASK_QTY
    source: dom
    type: u64
    comment: Ask quantity per price level (indexed by PRICE_IDX)
  - name: DOM_TIME
    source: dom
    type: u64
    comment: Latest TAI timestamp per price level
  - name: DOM_COUNT
    source: dom
    type: u64
    comment: Event count per price level
  - name: TF_BAR_SEQ_REG
    source: timeframe
    type: u64
    comment: Timeframe bar sequence (for bar-boundary detection)
  - name: FIFO_RX_TAI
    source: fifo_rx
    type: u64
    comment: TAI timestamp from ingress

dff_nodes:
  # Bar-level accumulators
  - name: TPO_BAR_START_TAI
    type: u64
    comment: TAI timestamp when bar opened
  - name: TPO_OPEN_SET
    type: u64
    comment: First price level seen in bar (bar open)
  - name: TPO_PREV_TAI
    type: u64
    comment: Last TAI timestamp processed
  - name: TPO_PREV_TRADE_CNT
    type: u64
    comment: Last trade count seen (for delta calculation)
  - name: TPO_BAR_MIN_PRICE
    type: u64
    comment: Minimum price touched in bar
  - name: TPO_BAR_MAX_PRICE
    type: u64
    comment: Maximum price touched in bar
  - name: TPO_BAR_POC_PRICE
    type: u64
    comment: Price level with most time exposure (running bar)
  - name: TPO_BAR_POC_TOTAL
    type: u64
    comment: Total time at bar POC level
  - name: TPO_BAR_POC_BID_TIME
    type: u64
    comment: Bid-side time at bar POC level
  - name: TPO_BAR_POC_ASK_TIME
    type: u64
    comment: Ask-side time at bar POC level
  - name: TPO_BAR_TIME_DELTA
    type: u64
    comment: Ask time - bid time at bar POC level
  - name: TPO_BAR_SEQ
    type: u64
    comment: Bar sequence number
  - name: TPO_BAR_PARITY
    type: u64
    comment: Virtual-reset parity tag (bit 63 of per-level entries)
  - name: TPO_BAR_CLOSED
    type: u64
    comment: Bar close flag (1 = closed)

  # Completed bar snapshot (carries to next bar)
  - name: TPO_COMP_POC_PRICE
    type: u64
    comment: Completed bar POC price
  - name: TPO_COMP_POC_BID_TIME
    type: u64
    comment: Completed bar POC bid time
  - name: TPO_COMP_POC_ASK_TIME
    type: u64
    comment: Completed bar POC ask time
  - name: TPO_COMP_TIME_DELTA
    type: u64
    comment: Completed bar time delta
  - name: TPO_COMP_BAR_SEQ
    type: u64
    comment: Completed bar sequence
  - name: TPO_COMP_BAR_TAI
    type: u64
    comment: Completed bar close TAI timestamp
  - name: TPO_COMP_MIN_PRICE
    type: u64
    comment: Completed bar minimum price
  - name: TPO_COMP_MAX_PRICE
    type: u64
    comment: Completed bar maximum price

tables:
  - name: TPO_BID_TIME
    type: u64
    depth: 16384
    index_from: PRICE_IDX
    comment: Cumulative bid-side time per price level (parity-tagged)
  - name: TPO_ASK_TIME
    type: u64
    depth: 16384
    index_from: PRICE_IDX
    comment: Cumulative ask-side time per price level (parity-tagged)

history_ring:
  depth: 256
  fields:
    - name: TPO_HIST_POC_PRICE
      type: u64
    - name: TPO_HIST_POC_BID_TIME
      type: u64
    - name: TPO_HIST_POC_ASK_TIME
      type: u64
    - name: TPO_HIST_TIME_DELTA
      type: u64
    - name: TPO_HIST_BAR_SEQ
      type: u64
    - name: TPO_HIST_MIN_PRICE
      type: u64
    - name: TPO_HIST_MAX_PRICE
      type: u64
    - name: TPO_HIST_BAR_TAI
      type: u64

seam_nodes:
  - name: TPO_POC_OUT
    from: TPO_COMP_POC_PRICE
    type: u64
    comment: Completed POC price relay output
  - name: TPO_POC_BID_OUT
    from: TPO_COMP_POC_BID_TIME
    type: u64
    comment: Completed POC bid time relay output
  - name: TPO_POC_ASK_OUT
    from: TPO_COMP_POC_ASK_TIME
    type: u64
    comment: Completed POC ask time relay output
  - name: TPO_TIME_DELTA_OUT
    from: TPO_COMP_TIME_DELTA
    type: u64
    comment: Completed time delta relay output
