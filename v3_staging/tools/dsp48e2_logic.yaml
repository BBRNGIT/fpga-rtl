# dsp48e2_logic.yaml — DSP48E2 Slice Hard-IP Depth Modeling (P1)
# Specification of DSP48E2 configuration variants for arithmetic/logic operations.
# Ref: UG579 (v1.7) Chapter 2: DSP48E2 Functionality
#
# Physical Element: DSP48E2 (ARITHMETIC subsystem)
# P1 Scope: configuration-only (behavior=spec), no gate-level decomposition
# All documented operation modes and pipeline configurations from UG579.

element: DSP48E2
kind: leaf
subsystem: ARITHMETIC

# ==================== Operation Modes ====================
# DSP48E2 primary modes from UG579 Table 2-1 (DSP48E2 Operation Modes)
operation_modes:
  - multiplier
      description: "A[29:0] x B[17:0] -> P[47:0], full 30x18 multiplier"
      width: "30x18"
      uses_ports: [A, B, P, ACIN, ACOUT, BCIN, BCOUT]

  - multiplier_with_cascade
      description: "Cascadeable multiplier: M -> P using PCIN/PCOUT"
      width: "30x18"
      uses_ports: [A, B, P, PCIN, PCOUT, ACIN, ACOUT, BCIN, BCOUT]

  - adder
      description: "Add/subtract A+B or A-B with optional C, carry in/out"
      width: "48-bit accumulator"
      uses_ports: [C, OPMODE, ALUMODE, CARRYINSEL, CARRYOUT, CARRYCASCIN, CARRYCASCOUT]

  - adder_with_cascade
      description: "Cascadeable adder: CARRYCASCIN/CARRYCASCOUT"
      width: "48-bit accumulator"
      uses_ports: [C, OPMODE, ALUMODE, CARRYINSEL, CARRYOUT, CARRYCASCIN, CARRYCASCOUT, PCIN, PCOUT]

  - accumulator
      description: "P=P+A*B or P=P+A (XADD), register at output"
      width: "48-bit"
      uses_ports: [P, PCIN, PCOUT, PREG, CEP, RSTP, OPMODE, ALUMODE]

  - xadd_mode
      description: "Pre-adder (XADD): (A+/-D)+B*C, controlled by INMODE[3] (add/subtract)"
      width: "30-bit pre-adder + 18x30 multiplier"
      uses_ports: [D, A, B, C, INMODE, OPMODE, ALUMODE]

  - pattern_detector
      description: "Detect pattern match on output P (rounding, saturation, etc.)"
      width: "48-bit pattern detect"
      uses_ports: [P, PATTERNDETECT, PATTERNBDETECT, C]

  - fully_pipelined
      description: "Maximum latency: input, multiply, accumulate, output stages"
      width: "varies"
      uses_ports: "*all"
      latency_cycles: 3

# ==================== Pipeline Configuration ====================
# AREG, BREG, CREG, DREG, MREG, PREG control pipeline register insertion.
# Ref: UG579 Section 3-3 (Register Control Attributes)
pipeline_stages:
  no_pipeline:
      areg: 0
      breg: 0
      creg: 0
      dreg: 0
      mreg: 0
      preg: 0
      description: "Combinational path (lowest latency, highest Fmax may be lower)"
      latency: 0

  input_stage:
      areg: 1
      breg: 1
      creg: 1
      dreg: 1
      mreg: 0
      preg: 0
      description: "Input registers A/B/C/D only"
      latency: 1

  mult_stage:
      areg: 0
      breg: 0
      creg: 0
      dreg: 0
      mreg: 1
      preg: 0
      description: "Multiply result register only"
      latency: 1

  output_stage:
      areg: 0
      breg: 0
      creg: 0
      dreg: 0
      mreg: 0
      preg: 1
      description: "Output register P only"
      latency: 1

  full_pipeline:
      areg: 2
      breg: 2
      creg: 1
      dreg: 1
      mreg: 1
      preg: 1
      description: "Maximum pipelining: all stages registered"
      latency: 3

  accumulator_pipeline:
      areg: 1
      breg: 1
      creg: 1
      dreg: 1
      mreg: 1
      preg: 1
      description: "Optimal for accumulation: P-feedback path registered"
      latency: 3

# ==================== Multiplier Configurations ====================
# A width (AREG width), B width (BREG width), product width
multiplier_widths:
  - name: "18x30"
      a_width: 30
      b_width: 18
      product_width: 48
      description: "Full-width: A[29:0] x B[17:0]"

  - name: "18x25"
      a_width: 25
      b_width: 18
      product_width: 43
      description: "Reduced A: A[24:0] x B[17:0]"

  - name: "25x18"
      a_width: 25
      b_width: 18
      product_width: 43
      description: "Alternative A width for certain applications"

# ==================== Control Signals ====================
# Clock enables and reset controls (async/sync)
control_config:
  clock_enables:
    - CEA1, CEA2   # A path clock enables
    - CEB1, CEB2   # B path clock enables
    - CED          # D path clock enable
    - CEAD         # A/D path combined clock enable
    - CEM          # Multiply stage clock enable
    - CEP          # Output stage clock enable
    - CEC          # C path clock enable
    - CEALUMODE    # ALU mode register clock enable
    - CEINMODE     # INMODE register clock enable
    - CECARRYIN    # Carry-in register clock enable
    - CECTRL       # OPMODE/ALUMODE/CARRYINSEL register clock enable

  resets:
    - RSTA         # A pipeline resets
    - RSTB         # B pipeline resets
    - RSTC         # C pipeline reset
    - RSTD         # D pipeline reset
    - RSTM         # Multiply register reset
    - RSTP         # Output register reset
    - RSTCTRL      # OPMODE/CARRYINSEL reset
    - RSTALUMODE   # ALUMODE reset
    - RSTINMODE    # INMODE reset
    - RSTALLCARRYIN # Carry chain reset

  sync_clock: CLK
  reset_polarity: active_high

# ==================== Cascade Configuration ====================
# P cascade (product), B cascade (B output), carry cascade
cascade_config:
  p_cascade:
      input: PCIN[47:0]
      output: PCOUT[47:0]
      direction: "vertical (north-south)"
      description: "P result can feed into next DSP slice"

  b_cascade:
      input: BCIN[17:0]
      output: BCOUT[17:0]
      direction: "vertical"
      description: "B output cascades to next slice (reduces B input wiring)"

  a_cascade:
      input: ACIN[29:0]
      output: ACOUT[29:0]
      direction: "vertical"
      description: "A output cascades (optional)"

  carry_cascade:
      input: CARRYCASCIN
      output: CARRYCASCOUT
      direction: "vertical"
      description: "Carry propagates for wide adders"

  mult_sign_cascade:
      input: MULTSIGNIN
      output: MULTSIGNOUT
      direction: "vertical"
      description: "Sign cascade for multi-slice multipliers"

  max_cascade_depth: "unlimited"

# ==================== Inversion Controls ====================
# IS_* attributes for active-low signal handling
inversion_attributes:
  - IS_CLK_INVERTED
  - IS_RSTA_INVERTED
  - IS_RSTB_INVERTED
  - IS_RSTC_INVERTED
  - IS_RSTD_INVERTED
  - IS_RSTM_INVERTED
  - IS_RSTP_INVERTED
  - IS_RSTCTRL_INVERTED
  - IS_RSTALUMODE_INVERTED
  - IS_RSTINMODE_INVERTED
  - IS_RSTALLCARRYIN_INVERTED
  - IS_OPMODE_INVERTED
  - IS_ALUMODE_INVERTED
  - IS_INMODE_INVERTED
  - IS_CARRYIN_INVERTED

# ==================== DMON (Debug Monitor) ====================
# Optional: Internal signal observability
dmon_config:
  dmon_enabled: false
  dmon_output: DMONITOROUT[16:0]
  dmon_clock: DMONITORCLK
  description: "17-bit internal signal probe (debug only)"

# ==================== P1 Status ====================
p1_status:
  configured: true
  depth_level: "full_config_variants"
  estimated_elements: 1
  catalog_entries: ["DSP48E2"]
  ports_extracted: 57
  config_space_size: "~128 configurations (8 modes × 5 pipeline × 3 widths)"
  status: "P1 complete - all documented configs from UG579"
  notes: "Cascading depth, pipelining, and all documented operation modes specified. Ready for gate-level refinement in P2/P3."
