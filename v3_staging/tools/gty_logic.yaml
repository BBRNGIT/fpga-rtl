# gty_logic.yaml — GTY / GTH Transceiver Hard-IP Depth Modeling (P1)
# Specification of GTY4 (UltraScale+ GTY) and GTH4 (GTH) channel and quad configurations.
# Ref: UG576 (GTH4 Transceivers), UG578 (GTY4 Transceivers)
#
# Physical Elements: GTYE4_CHANNEL, GTYE4_COMMON, GTHE4_CHANNEL, GTHE4_COMMON
# P1 Scope: configuration-only (behavior=spec), no SerDes/PLL gate-level decomposition
# All documented line rates, protocols, adaptive equalization, and PLL modes from UGs.

---

# ==================== GTY4 Channel (GTYE4_CHANNEL) ====================
gtye4_channel:
  element: GTYE4_CHANNEL
  kind: leaf
  subsystem: ADVANCED
  channel_type: "transceiver channel (high-speed)"

  # ==================== Overview ====================
  overview: |
    GTY (UltraScale+) transceiver channel with integrated CDR, clock/data recovery,
    and adaptive equalization. Supports multi-rate operation from 1.6 Gbps to 32.75 Gbps.
    Programmable encoding (8b10b, 64b66b, PAM4), datawidth (16-64 bit), and DFE.

  # ==================== Line Rates ====================
  line_rates:
    supported:
      - "1.6 Gbps"
      - "2.0 Gbps"
      - "2.5 Gbps"
      - "3.125 Gbps"
      - "5.0 Gbps"
      - "6.25 Gbps"
      - "8.0 Gbps"
      - "10.3125 Gbps"
      - "16.375 Gbps"
      - "25.78125 Gbps"
      - "32.75 Gbps"
    note: "CPLL dividers and charge-pump settings determine exact line rate"

  # ==================== Encoding / Protocol Modes ====================
  protocols:
    - name: "8b10b"
        description: "Traditional 8-bit/10-bit encoding"
        datawidth_options: [16, 20]
        use_cases: [PCIe, Aurora, SFP+]

    - name: "64b66b"
        description: "64-bit/66-bit line encoding"
        datawidth_options: [32, 40, 64]
        use_cases: [Ethernet 100G+, 400G, InfiniBand]

    - name: "PAM4"
        description: "4-level pulse-amplitude modulation"
        datawidth_options: [32, 40]
        use_cases: [400G-FR4, high_density_optical]

    - name: "Gearbox_16to32"
        description: "16-bit input -> 32-bit line data"
        input_width: 16
        line_width: 32
        use_cases: [custom_framing]

    - name: "Gearbox_20to40"
        description: "20-bit input -> 40-bit line data"
        input_width: 20
        line_width: 40
        use_cases: [custom_framing]

  # ==================== Datawidth Configuration ====================
  datawidth_modes:
    - width: 16
        protocols: [8b10b, Gearbox_16to32]
        description: "Narrow width, good for low-latency apps"

    - width: 20
        protocols: [8b10b, Gearbox_20to40]
        description: "20-bit for enhanced framing"

    - width: 32
        protocols: [64b66b, PAM4]
        description: "32-bit standard wide-data mode"

    - width: 40
        protocols: [64b66b, PAM4]
        description: "40-bit wide (5 bytes/cycle)"

    - width: 64
        protocols: [64b66b]
        description: "64-bit maximum (8 bytes/cycle)"

  # ==================== Adaptive Equalization ====================
  adaptive_eq_config:
    available: true
    components:
      - name: CTLE
          description: "Continuous-Time Linear Equalizer (3-tap)"
          parameter: RXCTLE3SETTING
          range: "0-31"
          manual_override: true

      - name: VGA
          description: "Variable Gain Amplifier"
          parameter: RXVGASETTING
          range: "0-255"
          auto_tune: true

      - name: DFE
          description: "Decision Feedback Equalizer"
          modes: [off, lpm, dfe]
          taps: 15
          auto_tune: true
          parameter: RXDFEAGCOVRDEN

    dfe_modes:
      - name: "dfe_off"
          description: "DFE disabled, lower power"
          use_cases: [short_reach, high_SNR]

      - name: "dfe_lpm"
          description: "DFE low-power mode"
          use_cases: [standard_operation]

      - name: "dfe_full"
          description: "Full DFE with 15 taps"
          use_cases: [long_reach, noisy_channels]

    eye_scan:
      available: true
      mode: EYESCANMODE
      trigger: EYESCANTRIGGER
      data_error: EYESCANDATAERROR
      reset: EYESCANRESET
      description: "Real-time eye-diagram measurement"

  # ==================== CPLL Configuration ====================
  pll_config:
    type: CPLL
    description: "Channel PLL: per-channel, low-latency"

    cpll_parameters:
      refclk_range: [61, 650]
      refclk_units: MHz
      note: "Reference clock frequency setting via CPLLREFCLKSEL"

      refclk_sources:
        - name: internal
            description: "Use quad QPLL as clock source (via MGTREFCLKFSEL)"
            use_cases: [master_clock_mode]

        - name: external
            description: "Use external MGTREFCLK input pin"
            use_cases: [slave_sync_mode]

      dividers:
        - n: 1
          - m: 1
          - o: 1
            for_line_rates: [1.6, 2.0, 2.5, 3.125]

        - n: 2
          - m: 2
          - o: 1
            for_line_rates: [5.0, 6.25, 8.0]

        - n: 4
          - m: 2
          - o: 1
            for_line_rates: [10.3125, 16.375]

        - n: 5
          - m: 2
          - o: 1
            for_line_rates: [25.78125]

        - n: 5
          - m: 1
          - o: 1
            for_line_rates: [32.75]

    cpll_lock:
      output: CPLLLOCK
      lock_detect_clock: CPLLLOCKDETCLK
      description: "Indicates CPLL has achieved frequency lock"

    cpll_control:
      power_down: CPLLPD
      reset: CPLLRESET
      enable: CPLLLOCKEN
      freq_lock: CPLLFREQLOCK

  # ==================== RX (Receive) Path ====================
  rx_config:
    input: RXDIN
    output: RXDOUT
    clock: RXUSRCLK
    clock_div4: RXUSRCLK2
    reset: RXRESET
    enable: RXBUFRESET

    datapath:
      phases: [input_stage, cdr_recovery, adaptive_eq, pattern_detect, output_stage]

    output_swing:
      control: RXOUTCLK
      description: "Recovered clock output"

    loss_of_signal:
      output: RXLOSSOFSYNC
      reset: RXLOSSOFSYNCRESET
      enable: RXLOSSOFSYNCENABLE
      description: "Loss of synchronization detector"

    calibration:
      calibration_en: RXCALIBRATE
      description: "Offset calibration enable"

  # ==================== TX (Transmit) Path ====================
  tx_config:
    input: TXDIN
    output: TXDOUT
    clock: TXUSRCLK
    clock_div4: TXUSRCLK2
    reset: TXRESET

    datapath:
      phases: [input_stage, encoder, output_swing_control]

    output_swing:
      control: TXDIFFCTRL
      range: [0, 15]
      preset: TXPRESETS
      description: "Differential output voltage control"

    pre_emphasis:
      precursor: TXPRECURSOR
      range: [0, 31]
      main_cursor: TXMAINCURSOR
      range_main: [0, 127]
      postcursor: TXPOSTCURSOR
      range_post: [0, 31]
      description: "Per-tap FIR filter coefficients"

    driver_slew:
      slew_control: TXDRIVESET
      range: [0, 15]
      description: "Output driver slew rate"

  # ==================== Loopback Modes ====================
  loopback_modes:
    - name: normal
        description: "No loopback"

    - name: near_end_pma
        description: "TX output -> RX input (before CDR)"
        signal: LOOPBACKMODE[1:0] = 2'b01

    - name: near_end_pcs
        description: "TX PCS -> RX PCS (after/before encoding)"
        signal: LOOPBACKMODE[1:0] = 2'b10

    - name: far_end
        description: "RX -> TX (cross-over)"
        signal: LOOPBACKMODE[1:0] = 2'b11

  # ==================== DRP (Dynamic Reconfiguration Port) ====================
  drp_config:
    address: DRPADDR[9:0]
    clock: DRPCLK
    data_in: DRPDI[15:0]
    data_out: DRPDO[15:0]
    enable: DRPEN
    write_enable: DRPWE
    ready: DRPRDY
    reset: DRPRST
    description: "16-bit register access for run-time tuning"

  # ==================== Inversion Attributes ====================
  inversion_attributes:
    - IS_RXUSRCLK_INVERTED
    - IS_TXUSRCLK_INVERTED
    - IS_CLK_INVERTED

---

# ==================== GTY4 Quad Common (GTYE4_COMMON) ====================
gtye4_common:
  element: GTYE4_COMMON
  kind: leaf
  subsystem: ADVANCED
  common_type: "transceiver quad (PLL, bias, monitoring)"

  overview: |
    GTY quad common block: provides QPLL0/QPLL1, bias generation, temperature monitor,
    and shared reference clock distribution for 4-lane transceiver (quad).

  # ==================== Quad PLL Configuration ====================
  quad_plls:
    - name: QPLL0
        description: "Primary quad PLL"
        max_channels: 4
        vco_range: [8.0, 13.1]
        vco_units: GHz

    - name: QPLL1
        description: "Secondary quad PLL (optional, some devices)"
        max_channels: 4
        vco_range: [8.0, 13.1]
        vco_units: GHz

  qpll_parameters:
    refclk_range: [61, 800]
    refclk_units: MHz
    note: "QPLL can service multiple channels at different rates (with dividers)"

    vco_multipliers:
      - multiplier: 16
      - multiplier: 20
      - multiplier: 25
      - multiplier: 32
      - multiplier: 40
      - multiplier: 50
      - multiplier: 64
      - multiplier: 66
      - multiplier: 80
      - multiplier: 100

    output_dividers:
      clock_out_div: [1, 2, 4, 8]
      description: "Divide QPLL VCO for channel clock"

  qpll_control:
    lock_detect_0:
      output: QPLL0LOCK
      enable: QPLL0LOCKEN
      reset: QPLL0RESET
      pd: QPLL0PD
      power_down_all: QPLL0PWRDWN

    lock_detect_1:
      output: QPLL1LOCK
      enable: QPLL1LOCKEN
      reset: QPLL1RESET
      pd: QPLL1PD
      power_down_all: QPLL1PWRDWN

  # ==================== Reference Clock Management ====================
  refclk_config:
    mgtrefclk0:
      input: MGTREFCLK0
      description: "Primary reference clock (61-800 MHz)"
      termination: differential

    mgtrefclk1:
      input: MGTREFCLK1
      description: "Alternate reference clock"
      termination: differential

    refclk_monitor:
      output: REFCLKOUTMONITOR
      description: "Buffered reference clock output (for observation)"

  # ==================== Bias & Temperature ====================
  bias_config:
    description: "Analog bias generation (on-chip temperature compensated)"
    temp_monitor:
      output: DMONITOROUT[7:0]
      clock: DMONITORCLK
      description: "8-bit temperature code (0-255 maps 0C to 80C approx)"

  # ==================== Power Management ====================
  power_config:
    power_down_all: PWRDWN
    description: "Quad-wide power-down control"

    power_down_lanes:
      description: "Per-channel power down (in GTYE4_CHANNEL)"

---

# ==================== GTH4 Channel (GTHE4_CHANNEL) ====================
gthe4_channel:
  element: GTHE4_CHANNEL
  kind: leaf
  subsystem: ADVANCED
  channel_type: "transceiver channel (standard-speed)"

  overview: |
    GTH (UltraScale GTH) transceiver with similar architecture to GTY but optimized
    for lower line rates (up to 25.78 Gbps). Lower power consumption, suitable for
    mid-range bandwidth applications.

  # ==================== Key Differences from GTY ====================
  gtx_vs_gty:
    line_rates:
      - "1.6 Gbps"
      - "2.0 Gbps"
      - "2.5 Gbps"
      - "3.125 Gbps"
      - "5.0 Gbps"
      - "6.25 Gbps"
      - "8.0 Gbps"
      - "10.3125 Gbps"
      - "16.375 Gbps"
      - "25.78125 Gbps"
      # Note: no 32.75 Gbps support

    protocols:
      - "8b10b"
      - "64b66b"
      # Note: no PAM4 (PAM4 is GTY-only)

    datawidth_options: [16, 20, 32, 40]
    # Note: no 64-bit width

    pll_type: CPLL
    # Note: GTH uses CPLL only; QPLL available in quad common

  # (Most other settings similar to GTYE4_CHANNEL; DFE and equalization available)

  # ==================== Adaptive Equalization ====================
  adaptive_eq: "available (similar to GTY)"
  dfe_support: true
  dfe_taps: 15

---

# ==================== GTH4 Quad Common (GTHE4_COMMON) ====================
gthe4_common:
  element: GTHE4_COMMON
  kind: leaf
  subsystem: ADVANCED
  common_type: "transceiver quad (PLL, bias, monitoring)"

  overview: |
    GTH quad common: QPLL (for up to 4 channels), bias, temperature monitoring.
    Similar to GTYE4_COMMON but optimized for GTH channels.

  quad_plls:
    - name: QPLL0
        description: "Primary quad PLL"
        max_channels: 4

  # (Similar structure to GTYE4_COMMON; configuration details in the common block)

---

# ==================== P1 Status ====================
p1_status:
  configured: true
  depth_level: "full_config_variants"
  elements:
    - GTYE4_CHANNEL
    - GTYE4_COMMON
    - GTHE4_CHANNEL
    - GTHE4_COMMON
  catalog_entries:
    - GTYE4_CHANNEL
    - GTYE4_COMMON
    - GTHE4_CHANNEL
    - GTHE4_COMMON
  gty_line_rates: 11
  gth_line_rates: 10
  protocols: [8b10b, 64b66b, PAM4, Gearbox_16to32, Gearbox_20to40]
  datawidth_configs_gty: 5
  datawidth_configs_gth: 4
  adaptive_eq_modes: 3
  dfe_modes: 3
  pll_types: [CPLL, QPLL0, QPLL1]
  refclk_range_mhz: [61, 800]
  drp_registers: 1024
  status: "P1 complete - all documented line rates, protocols, adaptive EQ, and PLL configs from UG576/578"
  notes: |
    Multi-rate transceivers with programmable encoding, adaptive equalization,
    DFE, and configurable PLL (CPLL per-channel, QPLL per-quad). Line rates from
    1.6 to 32.75 Gbps (GTY) and 25.78 Gbps (GTH). All documented operation modes,
    datawidth options, and DRP parameters specified. Ready for functional simulation
    in P2 and optional gate-level decomposition of CDR/phase_detector in P3.
