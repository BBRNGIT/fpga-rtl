# system.conf — SYSTEM CONFIGURATION. The BIOS reads this and applies it at boot
# (operator-loaded config, never data-wired). FPGA + every component. Editable
# from the BIOS Config menu (or by hand). key=value, [section] headers.

[fpga]
target=xczu19eg
master_power=0

[clocks]
internal.run_until=1000000
mac.run_until=1000000
taisoc.run_until=1000000
tai.run_until=1000000
timeframe.run_until=1000000

[adapter]
selected=xau_backtest
symbol=1
pip=100
commission=0
speed=1

[timeframe]
period_ns=60000000000

[indicators]
candle.multiplier=2
footprint.multiplier=1
tpo.multiplier=1

[fifo_rx]
depth=512

[display]
adapter=monitor
refresh_decimation=64
